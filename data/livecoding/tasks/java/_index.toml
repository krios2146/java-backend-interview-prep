  question = "Ускорение BFF: параллельные вызовы корзины и рекомендаций"
  answer = "**Условие задачи:**  \n📌 Наш BFF обращается к двум сервисам: `cart-service` (0.7s) и `recommendations-service` (0.5s). Последовательный вызов даёт >1s. Требование бизнеса — уложиться **менее чем в 1 секунду**. Нужно предложить решение и показать, как реализовать его в коде.\n\n**Код:**\n\n```java\n@FeignClient(name = \"cart-service\", url = \"http://shopping-cart\")\npublic interface ShoppingCartServiceClient {\n    @GetMapping(\"/api/v1/shopping-cart\")\n    CartDto getClientCart();\n}\n\n@FeignClient(name = \"recommendations-service\", url = \"http://recommendations\")\npublic interface RecommendationsServiceClient {\n    @GetMapping(\"/api/v1/recommendations\")\n    List<RecommendationDto> getClientRecommendations();\n}\n\npublic record ClientCartScreenDto(CartDto cart, List<RecommendationDto> recommendations) {}\n\n@Service\npublic class ClientCartScreenService {\n\n    public ClientCartScreenDto getScreenData() {\n\n        // todo: вызвать свои сервисы здесь\n\n        return new ClientCartScreenDto(cart, recommendations);\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Делайте вызовы **параллельно**: `CompletableFuture.supplyAsync(...)` и `CompletableFuture.allOf(...)`.  \n💡 Введите **timeouts** и **фолбэки** (например, пустые рекомендации при истечении времени), чтобы стабильно укладываться < 1s.  \n💡 Дополнительно можно применить **Resilience4j** (bulkhead/circuit breaker), а также **кэширование** рекомендаций.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n@Service\n@RequiredArgsConstructor\npublic class ClientCartScreenService {\n\n    private final ShoppingCartServiceClient cartClient;\n    private final RecommendationsServiceClient recommendationsClient;\n\n    public ClientCartScreenDto getScreenData() {\n        // Параллельные вызовы\n        CompletableFuture<CartDto> cartFuture =\n            CompletableFuture.supplyAsync(cartClient::getClientCart);\n\n        CompletableFuture<List<RecommendationDto>> recsFuture =\n            CompletableFuture.supplyAsync(recommendationsClient::getClientRecommendations)\n                // Жёсткий таймаут на рекомендации, чтобы не вылетать за 1s SLA\n                .orTimeout(700, java.util.concurrent.TimeUnit.MILLISECONDS)\n                // Фолбэк: при таймауте/ошибке — пустой список рекомендаций\n                .exceptionally(ex -> Collections.emptyList());\n\n        // Ждём оба результата\n        CompletableFuture.allOf(cartFuture, recsFuture).join();\n\n        CartDto cart = cartFuture.join(); // если корзина упадёт — пусть упадёт явно\n        List<RecommendationDto> recommendations = recsFuture.join();\n\n        return new ClientCartScreenDto(cart, recommendations);\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "bff-parallel-cart-and-recommendations"

[[tasks]]
  id = 83
  question = "Code Review: @Transactional + внешний HTTP вызов"
  answer = "**Условие задачи:**  \n📌 Есть сервис, который делает внешний HTTP-вызов и сохраняет результат в БД. Нужно провести код-ревью: какие проблемы в этом коде и как их исправить.\n\n**Код:**\n\n```java\n@Service\npublic class RestClient {\n\n    @Transactional\n    public void doWork() {\n        var obj = restTemplate.postForObject(...);\n        dbService.saveObj(obj);\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Не держите транзакцию БД во время сетевого запроса — это блокирует ресурсы и увеличивает риск длительных блокировок.  \n💡 Обработайте ошибки/таймауты внешнего вызова (timeouts, retries/circuit breaker, фолбэки).  \n💡 Сделайте `RestTemplate`/клиент биновым и внедряйте через конструктор.  \n💡 Разделите ответственность: внешний вызов отдельно, сохранение — в отдельной транзакции.  \n💡 Продумайте идемпотентность: если внешний вызов прошёл, а транзакция откатилась — возможны дубли/несогласованность.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n@Configuration\nclass HttpClientConfig {\n    @Bean\n    RestTemplate restTemplate() {\n        var factory = new HttpComponentsClientHttpRequestFactory();\n        factory.setConnectTimeout(2_000);\n        factory.setReadTimeout(3_000);\n        return new RestTemplate(factory);\n    }\n}\n\n@Service\n@RequiredArgsConstructor\nclass RestClientService {\n\n    private final RestTemplate restTemplate;\n    private final DbService dbService;\n\n    public void doWork() {\n        // 1) Внешний HTTP-вызов ВНЕ транзакции БД\n        ResponseDto obj = callRemote();\n\n        // 2) Отдельная короткая транзакция только на запись в БД\n        save(obj);\n    }\n\n    private ResponseDto callRemote() {\n        try {\n            // пример: добавьте идемпотентный ключ, если поддерживается провайдером\n            var headers = new HttpHeaders();\n            headers.add(\"Idempotency-Key\", UUID.randomUUID().toString());\n            var request = new HttpEntity<>(buildRequest(), headers);\n\n            return restTemplate.postForObject(\"https://remote/api\", request, ResponseDto.class);\n        } catch (RestClientResponseException ex) {\n            // HTTP 4xx/5xx\n            throw new ExternalServiceException(\"Remote error: \" + ex.getRawStatusCode(), ex);\n        } catch (ResourceAccessException ex) {\n            // таймауты/сети\n            throw new ExternalServiceException(\"Remote timeout/unavailable\", ex);\n        }\n    }\n\n    @Transactional\n    protected void save(ResponseDto obj) {\n        // валидация данных перед сохранением\n        if (obj == null) {\n            throw new IllegalArgumentException(\"Remote response is null\");\n        }\n        dbService.saveObj(obj);\n    }\n\n    private RequestDto buildRequest() {\n        // сконструируйте DTO запроса\n        return new RequestDto(/* ... */);\n    }\n}\n\n/** Пример доменных исключений — не даём \"прятать\" сетевые ошибки как SQL */\nclass ExternalServiceException extends RuntimeException {\n    ExternalServiceException(String msg, Throwable cause) { super(msg, cause); }\n}\n\n/** Пример DbService — транзакция может жить здесь, если хочется инкапсулировать слой */\n@Service\n@RequiredArgsConstructor\nclass DbService {\n    private final ObjRepository repo;\n\n    @Transactional(propagation = Propagation.MANDATORY)\n    public void saveObj(ResponseDto obj) {\n        repo.save(map(obj));\n    }\n\n    private ObjEntity map(ResponseDto dto) {\n        // mapper DTO -> Entity\n        return new ObjEntity(/* ... */);\n    }\n}\n```\n\n**Что исправлено и почему (кратко):**\n\n- 🚫 Убрали длительную БД-транзакцию вокруг сетевого вызова: теперь транзакция короткая и только на `save(...)`.\n\n- 🧯 Добавили таймауты и обработку ошибок для HTTP клиента, чтобы не висеть бесконечно.\n\n- 🧱 Разделили слои и ответственности, внедрение зависимостей — через конструктор.\n\n- 🔁 Продумана идемпотентность (Idempotency-Key) для избежания дублей при повторах.\n\n- ✅ Явные доменные исключения: проще различать сбои внешнего сервиса и БД.\n\n\n{{< /details >}}"
  filepath = "code-review-transactional-http-call"

[[tasks]]
  id = 84
  question = "Являются ли строки перестановками друг друга"
  answer = "**Условие задачи:**  \n📌 Нужно написать метод, который проверяет являются ли строки перестановками друг друга?\n\n**Код:**\n\n```java\n// Напишите метод arePermutations(String a, String b)\n\nSystem.out.println(arePermutations(\"abc\", \"bca\"));   // true\nSystem.out.println(arePermutations(\"aab\", \"aba\"));   // true\nSystem.out.println(arePermutations(\"abc\", \"abcc\"));  // false\nSystem.out.println(arePermutations(\"\", \"\"));         // true\nSystem.out.println(arePermutations(null, \"abc\"));    // false\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Сразу отсекайте разные длины.  \n💡 Подход 1 (простой): отсортировать массивы символов и сравнить.  \n💡 Подход 2 (линейный): посчитать частоты символов (Map) и сверить.  \n💡 Если нужно игнорировать регистр/пробелы — нормализуйте входные строки перед сравнением.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n// Вариант 1: через сортировку (O(n log n), простой и надёжный)\nstatic boolean arePermutations(String a, String b) {\n    if (a == null || b == null) return false;\n    if (a.length() != b.length()) return false;\n\n    char[] ca = a.toCharArray();\n    char[] cb = b.toCharArray();\n    Arrays.sort(ca);\n    Arrays.sort(cb);\n    return Arrays.equals(ca, cb);\n}\n\n// Вариант 2: через частоты символов (O(n), без доп. сортировки)\nstatic boolean arePermutationsLinear(String a, String b) {\n    if (a == null || b == null) return false;\n    if (a.length() != b.length()) return false;\n\n    Map<Character, Integer> freq = new HashMap<>();\n    for (char c : a.toCharArray()) {\n        freq.merge(c, 1, Integer::sum);\n    }\n    for (char c : b.toCharArray()) {\n        Integer cnt = freq.get(c);\n        if (cnt == null) return false;\n        if (cnt == 1) freq.remove(c);\n        else freq.put(c, cnt - 1);\n    }\n    return freq.isEmpty();\n}\n```\n\n{{< /details >}}"
  filepath = "permutations-of-strings"

[[tasks]]
  id = 85
  question = "Дженерик: получить первый элемент коллекции произвольного типа"
  answer = "**Условие задачи:**  \n📌 Нужно написать метод, который достаёт **один элемент** из коллекции и сохраняет его **тип**. Элементы коллекции могут быть произвольного типа. Желательно, чтобы решение было безопасным по типам и не требовало кастов.\n\n**Код:**\n\n```java\nclass A {\n\n    public static T getFirstElementOfList(List<T> list){\n        return list.size() > 0 ? list.get(0) : null;\n    }\n}\n\nObject - Number - Integer - AtomicInteger\n\nmethod(List<> producer)\n\nmethod(List<> consumer)\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 В объявлении метода нужен собственный параметр типа: `public static <T> ...`.  \n💡 Возвращать `null` неудобно и небезопасно — лучше `Optional<T>`.  \n💡 Для чтения из коллекции используйте wildcard `? extends T` (**PECS**: _Producer Extends_).  \n💡 Для записи в коллекцию используйте `? super T` (**Consumer Super**).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.*;\n\nclass A {\n\n    // Безопасный по типам вариант: не возвращаем null\n    public static <T> Optional<T> firstOf(List<? extends T> list) {\n        if (list == null || list.isEmpty()) return Optional.empty();\n        return Optional.ofNullable(list.get(0));\n    }\n\n    // Если строго нужен T (не Optional) — допускаем null,\n    // но такой вариант менее предпочтителен\n    public static <T> T firstOrNull(List<? extends T> list) {\n        return (list == null || list.isEmpty()) ? null : list.get(0);\n    }\n\n    // Демонстрация PECS для producer/consumer:\n\n    // producer: читаем элементы (коллекция производит T) → ? extends T\n    public static <T> void methodProducer(List<? extends T> producer) {\n        // можно читать как T\n        for (T t : producer) {\n            // use t\n        }\n        // producer.add(...) — НЕЛЬЗЯ (неизвестный подтип)\n    }\n\n    // consumer: записываем элементы (коллекция потребляет T) → ? super T\n    public static <T> void methodConsumer(List<? super T> consumer, T value) {\n        consumer.add(value); // можно добавлять T\n        // чтение даёт Object (безопасного downcast нет)\n        Object any = consumer.get(0);\n    }\n\n    // Примеры использования с иерархией типов:\n    public static void main(String[] args) {\n        List<Integer> ints = List.of(1, 2, 3);\n        List<Number> nums = new ArrayList<Number>(List.of(10.5, 20.0));\n        List<Object> objs = new ArrayList<>();\n\n        // firstOf сохраняет точный тип вывода:\n        Optional<Integer> i1 = firstOf(ints);      // Optional<Integer>\n        Optional<Number>  n1 = firstOf(nums);      // Optional<Number>\n\n        System.out.println(i1.orElse(-1)); // 1\n        System.out.println(n1.orElse(-1)); // 10.5\n\n        // PECS:\n        methodProducer(ints);              // List<? extends T> — ок для чтения\n        methodConsumer(objs, \"hello\");     // List<? super T> — ок для записи String\n        methodConsumer(nums, 42);          // запись Integer в List<? super Integer>\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "generic-first-element"

[[tasks]]
  id = 86
  question = "Группировка анаграмм"
  answer = "**Условие задачи:**  \nНаписать только функцию. На входе массив строк, на выходе сгруппированная структура. Тип выходных данных определяешь сам. Потом скажешь, почему используешь эту структуру. Могут быть записи с повторяющимися элементами. Вывод отсортировать лексикографически. Чем лучше по оценке скорости алгоритма, тем лучше\n\n- Дан массив строк, необходимо сгруппировать анаграммы   \n- Слово X является анаграммой Y, если одно может быть получено из другого перестановкой букв   \n- В итоговом массиве каждый массив анаграмм должен быть отсортирован в лексикографическом порядке   \n\nПример:\n\n```text\nВвод:\n['eat', 'tea', 'tan', 'ate', 'nat', 'batq']\n\nВывод:\n[\n    ['ate', 'eat', 'tea'],\n    ['nat', 'tan'],\n    ['batq']\n]\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Нужен ключ, который однозначно представит \"форму\" слова (его буквы и их количество).  \n💡 Вариант 1 (проще): отсортировать буквы в слове → `\"eat\"` → `\"aet\"`. Все анаграммы дадут одинаковый ключ.  \n💡 Вариант 2 (быстрее): посчитать частоты букв (массив `int[26]`) и сделать строковый ключ вроде `\"1#0#2#...\"`. Это даёт `O(n * L)` вместо `O(n * L log L)`.  \n💡 Удобно использовать `Map<key, List<String>>`, а в конце вернуть `List<List<String>>`.  \n💡 Не забудь отсортировать внутри каждой группы (`Collections.sort(...)`).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n// Предполагаем, что слова состоят из строчных латинских букв a-z.\n// Возвращаем List<List<String>> — естественное представление \"список групп строк\".\npublic static List<List<String>> groupAnagrams(String[] words) {\n    if (words == null || words.length == 0) {\n        return List.of();\n    }\n\n    // Ключ -> список анаграмм\n    Map<String, List<String>> groups = new HashMap<>();\n\n    for (String word : words) {\n        // частоты букв: index = буква - 'a'\n        int[] freq = new int[26];\n        for (int i = 0; i < word.length(); i++) {\n            char c = word.charAt(i);\n            // если нужно поддержать другие символы, этот подход надо расширять\n            freq[c - 'a']++;\n        }\n\n        // строим строковый ключ из частот\n        StringBuilder keyBuilder = new StringBuilder();\n        for (int count : freq) {\n            keyBuilder.append(count).append('#');\n        }\n        String key = keyBuilder.toString();\n\n        groups.computeIfAbsent(key, k -> new ArrayList<>())\n              .add(word);\n    }\n\n    // итог: сортируем каждую группу лексикографически\n    List<List<String>> result = new ArrayList<>(groups.size());\n    for (List<String> group : groups.values()) {\n        Collections.sort(group);\n        result.add(group);\n    }\n\n    return result;\n}\n```\n\n**Почему именно такая структура и алгоритм:**\n\n- ✅ **`Map<String, List<String>>` как промежуточная структура**\n\n    - `String`-ключ — \"форма\" слова (его буквенный состав).\n\n    - `List<String>` — все слова, которые разделяют эту форму, то есть анаграммы.\n\n- ✅ **`List<List<String>>` как возвращаемый тип**\n\n    - Естественное представление: \"список групп строк\".\n\n    - Удобно и для вывода, и для дальнейшей обработки.\n\n- ⚙️ **Сложность алгоритма:**\n\n    - Для каждого слова длины `L` мы:\n\n        - Один раз проходим по буквам → `O(L)`,\n\n        - Строим ключ из 26 элементов → `O(26) ~ O(1)`.\n\n    - Итого по всем словам (`n` слов): **`O(n * L)`** по времени.\n\n    - По памяти: храним все слова + карту ключей ~ `O(n * L)`.\n\n\nДля собеседования можно отдельно упомянуть, что:\n\n- Более простой, но медленный вариант — сортировать буквы в каждом слове (`O(L log L)` на слово).\n\n- Текущий вариант с частотами букв асимптотически быстрее при длинных словах.\n\n\n{{< /details >}}"
  filepath = "group-anagrams"

[[tasks]]
  id = 87
  question = "Реализация собственного MyArrayList по аналогии с ArrayList"
  answer = "**Условие задачи:**  \n📌 Нужно реализовать свой динамический список `MyArrayList<T>` с методами:  \n`add`, `get`, `remove`, `size`, а также внутренней логикой расширения массива.  \nПоведение должно быть аналогично `java.util.ArrayList`.\n\n**Код (входные данные):**\n\n```java\npublic class Main {\n\n    public static void Main(String[] args) {\n        MyArrayList<String> list = new MyArrayList();\n\n        list.add(\"Привет\");\n        list.add(\"Мир\");\n        list.add(\"Java\");\n\n        System.out.println(\"Элемент по индексу 1: \" + list.get(1));\n        System.out.println(\"Размер: \" + list.size());\n\n        list.remove(1);\n\n        System.out.println(\"После удаления:\");\n        for (int i = 0; i < list.size(); i++) {\n            System.out.println(list.get(i));\n        }\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Внутри нужно хранить массив `Object[]`.  \n💡 Начальный capacity можно взять 10, как в `ArrayList`.  \n💡 При заполнении массива надо делать `grow()` → расширять в 1.5–2 раза.  \n💡 При удалении нужно сдвинуть элементы `System.arraycopy`.  \n💡 Не забыть проверки на выход за пределы.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.Arrays;\n\npublic class MyArrayList<T> {\n\n    private Object[] data;\n    private int size;\n    private static final int DEFAULT_CAPACITY = 10;\n\n    public MyArrayList() {\n        this.data = new Object[DEFAULT_CAPACITY];\n    }\n\n    public int size() {\n        return size;\n    }\n\n    public void add(T element) {\n        ensureCapacity(size + 1);\n        data[size++] = element;\n    }\n\n    public T get(int index) {\n        checkIndex(index);\n        return (T) data[index];\n    }\n\n    public T remove(int index) {\n        checkIndex(index);\n        T removed = (T) data[index];\n\n        int elementsAfter = size - index - 1;\n        if (elementsAfter > 0) {\n            System.arraycopy(data, index + 1, data, index, elementsAfter);\n        }\n\n        data[--size] = null; // освобождаем ссылку\n        return removed;\n    }\n\n    private void ensureCapacity(int minCapacity) {\n        if (minCapacity > data.length) {\n            int newCapacity = data.length + (data.length >> 1); // *1.5\n            if (newCapacity < minCapacity) {\n                newCapacity = minCapacity;\n            }\n            data = Arrays.copyOf(data, newCapacity);\n        }\n    }\n\n    private void checkIndex(int index) {\n        if (index < 0 || index >= size) {\n            throw new IndexOutOfBoundsException(\n                    \"Index \" + index + \" out of bounds for size \" + size);\n        }\n    }\n}\n```\n\n**Пример работы кода из Main:**\n\n```\nЭлемент по индексу 1: Мир\nРазмер: 3\nПосле удаления:\nПривет\nJava\n```\n\n🧠 **Ключевые моменты реализации:**\n\n- Храним элементы в `Object[]`, а при чтении кастуем к `T`.\n\n- При добавлении проверяем, хватает ли места, и расширяем массив.\n\n- При удалении сдвигаем элементы влево, как в `ArrayList`.\n\n- Поддерживаем корректный `size`.\n\n\n{{< /details >}}"
  filepath = "implement-myarraylist"

