  id = 69
  question = "Code Review: OrderService"
  answer = "🔥 Сделай ревью кода ниже. На что обратить внимание, что исправить, какие риски и улучшения возможны?\n\n```java\npublic class OrderService {\n\n@Autowired\nprivate OrderRepository orderRepository;\n\n@Inject\nprivate AuditRepository auditRepository;\n\npublic void save(Order order) throws OrderValidationException {\n    try {\n        saveOrderInternal(order);\n    } catch (Throwable e) {\n        e.printStackTrace();\n        throw new OrderSaveException(e, order);\n    }\n}\n\n@Transactional\nprivate void saveOrderInternal(Order order) throws OrderValidationException {\n    auditRepository.save(order);\n    if (order.getClient().getName() == \"\"\"\") {\n            throw new OrderValidationException(\"\"Поле клиент не заполнено.\"\");\n        }\n        orderRepository.save(order);\n    }\n}\n\npublic class OrderValidationException extends Exception {\n    // ...\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Не смешивай разные DI-аннотации: выбери `@Autowired` или `@Inject`.  \n💡 Не используй `Throwable` в `catch`: лучше `Exception` или более узкий тип.  \n💡 Валидацию лучше делать **до сохранения**, а не посреди транзакции.  \n💡 Для строк используй `isEmpty()` или `StringUtils.isBlank()`, а не `== \"\"`.  \n💡 Метод `saveOrderInternal` приватный, но аннотация `@Transactional` не подействует на внутренние вызовы.  \n💡 `auditRepository.save(order)` до валидации — может оставить “грязные” записи.  \n💡 Лучше работать с кастомными исключениями: checked vs unchecked. Обычно для бизнес-исключений делают `RuntimeException`.  \n💡 Логирование через `logger.error(...)`, а не `printStackTrace()`.  \n💡 Нарушение SRP: класс одновременно отвечает за валидацию, сохранение и аудит.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n@Service\npublic class OrderService {\n\n    private final OrderRepository orderRepository;\n    private final AuditRepository auditRepository;\n    private final OrderValidator orderValidator;\n    private static final Logger log = LoggerFactory.getLogger(OrderService.class);\n\n    @Autowired\n    public OrderService(OrderRepository orderRepository,\n                        AuditRepository auditRepository,\n                        OrderValidator orderValidator) {\n        this.orderRepository = orderRepository;\n        this.auditRepository = auditRepository;\n        this.orderValidator = orderValidator;\n    }\n\n    @Transactional\n    public void save(Order order) {\n        try {\n            orderValidator.validate(order); // валидация до сохранения\n\n            orderRepository.save(order);\n            auditRepository.save(order);\n\n        } catch (OrderValidationException e) {\n            log.warn(\"Ошибка валидации заказа: {}\", order, e);\n            throw e;\n        } catch (Exception e) {\n            log.error(\"Ошибка сохранения заказа: {}\", order, e);\n            throw new OrderSaveException(e, order);\n        }\n    }\n}\n\n@Component\npublic class OrderValidator {\n    public void validate(Order order) throws OrderValidationException {\n        if (order.getClient() == null || \n            order.getClient().getName() == null || \n            order.getClient().getName().isBlank()) {\n            throw new OrderValidationException(\"Поле клиент не заполнено.\");\n        }\n    }\n}\n```\n\n- Валидация вынесена в отдельный класс.\n\n- Исключения обрабатываются с логированием.\n\n- `@Transactional` применяется на публичный метод, чтобы AOP-прокси сработал.\n\n- `auditRepository.save(order)` выполняется **после успешного сохранения** заказа.\n\n\n{{< /details >}}"
  filepath = "order-service-review2"

[[tasks]]
  id = 70
  question = "Проверка палиндрома в цикле без методов строк"
  answer = "Написать функцию для проверки палиндрома, обрабатывая строку только в циклах.\nНельзя использовать replace(), trim() и другие методы для обработки строк.\nНужно игнорировать пробелы и проверять только буквы/символы.\n\n---\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте два указателя: один с начала, другой с конца строки  \n💡 Пропускайте пробелы, перемещая указатели внутрь строки  \n💡 Сравнивайте символы, игнорируя регистр (Character.toLowerCase())  \n💡 Продолжайте до тех пор, пока указатели не встретятся  \n💡 Проверяйте, что символы совпадают на каждой итерации  \n💡 Обработайте случай, когда строка состоит только из пробелов  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class PalindromeChecker {\n    \n    public static boolean isPalindrome(String s) {\n        if (s == null) return false;\n        \n        int left = 0;\n        int right = s.length() - 1;\n        boolean foundValidChars = false;\n        \n        while (left <= right) {\n            // Пропускаем пробелы слева\n            while (left <= right && s.charAt(left) == ' ') {\n                left++;\n            }\n            \n            // Пропускаем пробелы справа\n            while (left <= right && s.charAt(right) == ' ') {\n                right--;\n            }\n            \n            // Если после пропуска пробелов не осталось символов\n            if (left > right) {\n                return foundValidChars;\n            }\n            \n            // Отмечаем, что нашли хотя бы одну пару символов для сравнения\n            foundValidChars = true;\n            \n            // Сравниваем символы (игнорируя регистр)\n            char leftChar = Character.toLowerCase(s.charAt(left));\n            char rightChar = Character.toLowerCase(s.charAt(right));\n            \n            if (leftChar != rightChar) {\n                return false;\n            }\n            \n            // Перемещаем указатели\n            left++;\n            right--;\n        }\n        \n        return true;\n    }\n    \n    public static void main(String[] args) {\n        // Тестовые случаи из задания\n        System.out.println(isPalindrome(\" fly me to the moon \")); // false\n        System.out.println(isPalindrome(\"  сел в   озере   березов лес     \")); // true\n        \n        // Дополнительные тесты\n        System.out.println(isPalindrome(\"а роза упала на лапу азора\")); // true\n        System.out.println(isPalindrome(\"hello world\")); // false\n        System.out.println(isPalindrome(\"a\")); // true\n        System.out.println(isPalindrome(\"   \")); // false (только пробелы)\n        System.out.println(isPalindrome(\"\")); // false (пустая строка)\n    }\n}\n```\n\n**Алгоритм по шагам:**\n\n1. **Инициализация указателей** - `left` с начала (0), `right` с конца (длина - 1)\n2. **Пропуск пробелов** - двигаем указатели мимо пробелов с обеих сторон\n3. **Проверка окончания** - если указатели пересеклись, возвращаем результат\n4. **Сравнение символов** - приводим к нижнему регистру и сравниваем\n5. **Несовпадение** - возвращаем false при первой ошибке\n6. **Движение к центру** - сдвигаем указатели и повторяем\n\n**Особенности решения:**\n- Работает с любым количеством пробелов\n- Игнорирует регистр букв\n- Корректно обрабатывает строки только из пробелов (возвращает false)\n- Эффективно использует память (O(1) дополнительной памяти)\n- Временная сложность O(n)\n\n**Результаты для тестовых случаев:**\n- `\" fly me to the moon \"` → **false** (не палиндром)\n- `\" сел в озере березов лес \"` → **true** (палиндром)\n  {{< /details >}}"
  filepath = "palindrome-loop"

