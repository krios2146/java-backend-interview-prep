  id = 16
  question = "Реализовать форматирование текста в консоли"
  answer = "**Условие задачи:**  \nНапиши метод, который принимает строку и выводит на консоль отформатированный текст в виде рамки. В рамках должна быть отображена каждая часть строки в отдельной строке так, как показано в примере ниже.  \n😊 **Пример вывода:**\n\n```\n****************\n*  I           *\n*  am          *\n*  Java        *\n*  Developer   *\n****************\n```\n\n---\n\n**Код:**\n\n```java\npublic class Task1 {\n    private static final String TEXT = \"I am Java Developer\";\n\n    /*\n    ****************\n    *  I           *\n    *  am          *\n    *  Java        *\n    *  Developer   *\n    ****************\n    */\n\n    /**\n     * Реализовать функцию вывода на консоль текста в параметре TEXT в формате, указанном выше.\n     */\n    public void printFormattedText(String text) {\n        throw new UnsupportedOperationException(\"Implemented it!\");\n    }\n}\n```\n\n---\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n\n- **Разбей строку на слова:**  \n    Используй метод `split(\" \")`, чтобы получить массив слов.\n- **Вычисли максимальную длину слова:**  \n    Это поможет правильно установить ширину рамки.\n- **Построй рамку:**  \n    Используй символ `*` для создания верхней и нижней границы.\n- **Форматированный вывод:**  \n    При выводе каждого слова используй форматирование, чтобы добавить пробелы до нужной длины.\n\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class Task1 {\n    private static final String TEXT = \"I am Java Developer\";\n\n    /**\n     * Функция выводит текст, разбитый на слова, в виде рамки.\n     * Пример:\n     * ****************\n     * *  I           *\n     * *  am          *\n     * *  Java        *\n     * *  Developer   *\n     * ****************\n     */\n    public void printFormattedText(String text) {\n        if (text == null || text.trim().isEmpty()) {\n            System.out.println(\"Текст пустой!\");\n            return;\n        }\n        \n        // Разбиваем строку на слова\n        String[] words = text.split(\"\\\\s+\");\n        \n        // Находим максимальную длину слова\n        int maxLength = 0;\n        for (String word : words) {\n            if (word.length() > maxLength) {\n                maxLength = word.length();\n            }\n        }\n        \n        // Формируем верхнюю и нижнюю границы рамки\n        String border = \"*\".repeat(maxLength + 6);\n        \n        // Вывод рамки\n        System.out.println(border);\n        for (String word : words) {\n            // Форматируем вывод так, чтобы слово выводилось с отступами\n            System.out.printf(\"*  %-\"+maxLength+\"s  *%n\", word);\n        }\n        System.out.println(border);\n    }\n    \n    public static void main(String[] args) {\n        Task1 task = new Task1();\n        task.printFormattedText(TEXT);\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "printformattedtext"

[[tasks]]
  id = 17
  question = "Рефакторинг кода PersonService"
  answer = "**Условие задачи:**  \n🔥 Проведи **рефакторинг**\n\n**Код:**\n\n```java\npublic class PersonService { \n    // no usages\n    @return\n    public void getAdultMaleUsersAverageBMI() {\n        double totalIMT = 0.0;\n        long countOfPerson = 0;\n        double heightInMeters = 0d;\n        double imt = 0d;\n        List<Person> adultPersons = new ArrayList<>();\n        try {\n            Connection c = DriverManager.getConnection(\"jdbc:hsqldb:mem:test\", \"admin\", \"qwerty54\");\n            Statement s = c.createStatement();\n            ResultSet rs = s.executeQuery(\"SELECT * FROM person WHERE sex = 'male' AND age >= 18\");\n            while (rs.next()) {\n                Person p = new Person();\n                p.setId(rs.getLong(\"id\"));\n                p.setSex(rs.getString(\"sex\"));\n                p.setName(rs.getString(\"name\"));\n                p.setAge(rs.getLong(\"age\"));\n                p.setWeight(rs.getLong(\"weight\"));\n                p.setHeight(rs.getLong(\"height\"));\n                adultPersons.add(p);\n            }\n            for (Person p : adultPersons) {\n                heightInMeters = p.getHeight() / 100d;\n                imt = p.getWeight() / (Double) (heightInMeters * heightInMeters);\n                totalIMT += imt;\n            }\n            countOfPerson = adultPersons.size();\n        } catch (Exception e) {\n            e.printStackTrace();\n        }\n        System.out.println(\"Average imt = \" + totalIMT / countOfPerson);\n    }\n}\n```\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 **Избавься от ненужного списка `adultPersons`** – сразу считай BMI во время чтения из `ResultSet`.  \n💡 **Используй `try-with-resources`** для автоматического закрытия соединений.  \n💡 **Избавься от избыточных переменных** – сразу вычисляй `imt` и обновляй `totalIMT`.  \n💡 **Добавь логирование ошибок** вместо `printStackTrace()`.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.sql.*;\n\npublic class PersonService { \n\n    public void getAdultMaleUsersAverageBMI() {\n        String query = \"SELECT weight, height FROM person WHERE sex = 'male' AND age >= 18\";\n        double totalIMT = 0.0;\n        long countOfPerson = 0;\n\n        try (Connection c = DriverManager.getConnection(\"jdbc:hsqldb:mem:test\", \"admin\", \"qwerty54\");\n             Statement s = c.createStatement();\n             ResultSet rs = s.executeQuery(query)) {\n\n            while (rs.next()) {\n                double heightInMeters = rs.getDouble(\"height\") / 100.0;\n                double imt = rs.getDouble(\"weight\") / (heightInMeters * heightInMeters);\n                totalIMT += imt;\n                countOfPerson++;\n            }\n\n            if (countOfPerson > 0) {\n                System.out.printf(\"Average BMI = %.2f%n\", totalIMT / countOfPerson);\n            } else {\n                System.out.println(\"No adult male users found.\");\n            }\n\n        } catch (SQLException e) {\n            System.err.println(\"Database error: \" + e.getMessage());\n        }\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Меньше кода** – убрали лишний список `adultPersons`.  \n✅ **Оптимизирована память** – теперь `Person` объекты не создаются, если не нужны.  \n✅ **Используется `try-with-resources`** – ресурсы закрываются автоматически.  \n✅ **Добавлена проверка на пустой результат** – если мужчин нет, выводится сообщение.  \n✅ **Более чистый и понятный код**.\n{{< /details >}}"
  filepath = "refactor-personservice"

