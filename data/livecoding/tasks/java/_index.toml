  id = 18
  question = "Разработать сервиса поиска обуви"
  answer = "**Условие задачи:**  \n👞 **Разработай сервис для поиска обуви!**  \nТебе нужно создать **REST API** с эндпоинтом `POST /api/v1/search`, который принимает запрос с фильтрами и возвращает список подходящих товаров.\n\n🔍 **Фильтрация обуви:**\n\n- **Сапоги** → цвет **красный** или **зелёный**, цена **от 5000 до 20000**.\n- **Туфли** → цена **меньше 10000**.\n\n📩 **Пример запроса:**\n\n```json\n{\n    \"type\": \"сапоги\",\n    \"color\": [\"красный\", \"зелёный\"],\n    \"minPrice\": 5000,\n    \"maxPrice\": 20000\n}\n```\n\n📤 **Пример ответа:**\n\n```json\n[\n    {\n        \"type\": \"сапоги\",\n        \"color\": \"красный\",\n        \"price\": 15000,\n        \"url\": \"https://example.com/shoe1\"\n    },\n    {\n        \"type\": \"сапоги\",\n        \"color\": \"зелёный\",\n        \"price\": 18000,\n        \"url\": \"https://example.com/shoe2\"\n    }\n]\n```\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 **Используй Spring Boot + Spring Data JPA** для работы с БД.  \n💡 **Создай сущность `Shoe`** с полями `type`, `color`, `price`, `url`.  \n💡 **Напиши DTO-классы** для запроса и ответа.  \n💡 **Используй `JpaRepository`** и напиши кастомный метод для поиска.  \n💡 **Контроллер должен принимать JSON-запрос** и возвращать список обуви.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n📌 **1. Создаём сущность `Shoe`**\n\n```java\nimport jakarta.persistence.*;\nimport lombok.Data;\n\n@Entity\n@Data\npublic class Shoe {\n    @Id\n    @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private Long id;\n    private String type;\n    private String color;\n    private Double price;\n    private String url;\n}\n```\n\n📌 **2. Создаём DTO для запроса**\n\n```java\nimport lombok.Data;\nimport java.util.List;\n\n@Data\npublic class ShoeSearchRequest {\n    private String type;\n    private List<String> color;\n    private Double minPrice;\n    private Double maxPrice;\n}\n```\n\n📌 **3. Создаём DTO для ответа**\n\n```java\nimport lombok.Data;\n\n@Data\npublic class ShoeResponse {\n    private String type;\n    private String color;\n    private Double price;\n    private String url;\n}\n```\n\n📌 **4. Репозиторий с кастомным запросом**\n\n```java\nimport org.springframework.data.jpa.repository.JpaRepository;\nimport org.springframework.data.jpa.repository.Query;\nimport org.springframework.data.repository.query.Param;\nimport java.util.List;\n\npublic interface ShoeRepository extends JpaRepository<Shoe, Long> {\n\n    @Query(\"SELECT s FROM Shoe s WHERE \" +\n           \"(:type IS NULL OR s.type = :type) AND \" +\n           \"(COALESCE(:colors, NULL) IS NULL OR s.color IN :colors) AND \" +\n           \"(s.price BETWEEN :minPrice AND :maxPrice)\")\n    List<Shoe> searchShoes(@Param(\"type\") String type,\n                           @Param(\"colors\") List<String> colors,\n                           @Param(\"minPrice\") Double minPrice,\n                           @Param(\"maxPrice\") Double maxPrice);\n}\n```\n\n📌 **5. Сервисный слой**\n\n```java\nimport org.springframework.stereotype.Service;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\n@Service\npublic class ShoeService {\n    private final ShoeRepository shoeRepository;\n\n    public ShoeService(ShoeRepository shoeRepository) {\n        this.shoeRepository = shoeRepository;\n    }\n\n    public List<ShoeResponse> searchShoes(ShoeSearchRequest request) {\n        List<Shoe> shoes = shoeRepository.searchShoes(\n                request.getType(),\n                request.getColor(),\n                request.getMinPrice() != null ? request.getMinPrice() : 0,\n                request.getMaxPrice() != null ? request.getMaxPrice() : Double.MAX_VALUE\n        );\n\n        return shoes.stream().map(shoe -> {\n            ShoeResponse response = new ShoeResponse();\n            response.setType(shoe.getType());\n            response.setColor(shoe.getColor());\n            response.setPrice(shoe.getPrice());\n            response.setUrl(shoe.getUrl());\n            return response;\n        }).collect(Collectors.toList());\n    }\n}\n```\n\n📌 **6. Контроллер**\n\n```java\nimport org.springframework.web.bind.annotation.*;\nimport java.util.List;\n\n@RestController\n@RequestMapping(\"/api/v1/search\")\npublic class ShoeController {\n    private final ShoeService shoeService;\n\n    public ShoeController(ShoeService shoeService) {\n        this.shoeService = shoeService;\n    }\n\n    @PostMapping\n    public List<ShoeResponse> searchShoes(@RequestBody ShoeSearchRequest request) {\n        return shoeService.searchShoes(request);\n    }\n}\n```\n\n---\n\n🚀 **Что получилось?**  \n✅ **Чистая архитектура**: Контроллер, сервис, репозиторий, DTO.  \n✅ **Гибкий поиск**: Можно искать не только по заданным условиям, но и добавлять новые фильтры.  \n✅ **Использование `Spring Data JPA`** для удобного запроса к БД.\n{{< /details >}}"
  filepath = "shoes-service"

[[tasks]]
  id = 19
  question = "Генерация ряда Фибоначчи"
  answer = "**Условие задачи:**  \n🔢 **Реализуй метод, который принимает число `n` и возвращает ряд Фибоначчи длиной `n`**.\n\n📌 **Пример:**\n\n```java\nInput:  7  \nOutput: [0, 1, 1, 2, 3, 5, 8]\n```\n\n\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 **Ряд Фибоначчи** – это последовательность чисел, где каждое число равно сумме двух предыдущих:  \n`0, 1, 1, 2, 3, 5, 8, 13, ...`  \n💡 Для решения можно использовать **итеративный** или **рекурсивный** подход.  \n💡 Оптимальный вариант – использовать **динамическое программирование** или **итерацию**.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n📌 **1. Итеративный способ (быстрее, не требует много памяти)**\n\n```java\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Fibonacci {\n    public static List<Integer> generateFibonacci(int n) {\n        List<Integer> sequence = new ArrayList<>();\n        if (n <= 0) return sequence;\n\n        sequence.add(0);\n        if (n == 1) return sequence;\n\n        sequence.add(1);\n        for (int i = 2; i < n; i++) {\n            sequence.add(sequence.get(i - 1) + sequence.get(i - 2));\n        }\n        return sequence;\n    }\n\n    public static void main(String[] args) {\n        System.out.println(generateFibonacci(7));\n    }\n}\n```\n\n💨 **Сложность алгоритма:** O(n)\n\n---\n\n📌 **2. Рекурсивный способ (медленнее, но красиво)**\n\n```java\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class FibonacciRecursive {\n    public static List<Integer> generateFibonacci(int n) {\n        List<Integer> sequence = new ArrayList<>();\n        for (int i = 0; i < n; i++) {\n            sequence.add(fib(i));\n        }\n        return sequence;\n    }\n\n    private static int fib(int n) {\n        if (n <= 1) return n;\n        return fib(n - 1) + fib(n - 2);\n    }\n\n    public static void main(String[] args) {\n        System.out.println(generateFibonacci(7));\n    }\n}\n```\n\n⚠ **Минус:** экспоненциальная сложность O(2ⁿ), медленно для больших `n`.\n\n---\n\n📌 **3. Оптимизированный рекурсивный способ (через мемоизацию)**\n\n```java\nimport java.util.HashMap;\nimport java.util.Map;\n\npublic class FibonacciMemoization {\n    private static final Map<Integer, Integer> memo = new HashMap<>();\n\n    public static int fib(int n) {\n        if (n <= 1) return n;\n        if (memo.containsKey(n)) return memo.get(n);\n        int result = fib(n - 1) + fib(n - 2);\n        memo.put(n, result);\n        return result;\n    }\n\n    public static void main(String[] args) {\n        System.out.println(fib(7));\n    }\n}\n```\n\n⚡ **Плюс:** сложность O(n), запоминает вычисленные значения.\n\n---\n\n🚀 **Вывод:**  \n✅ Итеративный способ – лучший по производительности.  \n✅ Рекурсия – красива, но требует оптимизации (мемоизация).  \n✅ Теперь ты умеешь генерировать ряд Фибоначчи разными способами! 🔥\n{{< /details >}}"
  filepath = "fibonacci-sequence"

[[tasks]]
  id = 20
  question = "Поиск Person по имени"
  answer = "**Условие задачи:**  \n🔍 **Реализовать метод `findPersonByName`, который ищет объект `Person` в списке по имени.**  \n📌 **Если человек найден – вернуть `Optional<Person>`, иначе вернуть `Optional.empty()`.**\n\n📌 **Пример:**\n\n```java\n\nclass Person {\n        String name;\n        Integer age;\n}\n\nOptional <Person> findPersonByName(List<Person> persons, String name) {\n        return null;\n}\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n**Подсказки:**  \n💡 Используй `Optional` для обработки случая, когда человек не найден.  \n💡 Можно использовать `stream().filter().findFirst()`, `for-each` или `for`-цикл.  \n💡 `equalsIgnoreCase()` поможет искать без учета регистра.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n**Решение:**\n\n📌 **1. Через Stream API (кратко и элегантно)**\n\n```java\nimport java.util.List;\nimport java.util.Optional;\n\nclass Person {\n    String name;\n    Integer age;\n\n    public Person(String name, Integer age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    @Override\n    public String toString() {\n        return \"Person{name='\" + name + \"', age=\" + age + \"}\";\n    }\n}\n\npublic class PersonFinder {\n    public static Optional<Person> findPersonByName(List<Person> persons, String name) {\n        return persons.stream()\n                .filter(p -> p.name.equalsIgnoreCase(name))\n                .findFirst();\n    }\n\n    public static void main(String[] args) {\n        List<Person> persons = List.of(\n            new Person(\"Alice\", 25),\n            new Person(\"Bob\", 30)\n        );\n\n        System.out.println(findPersonByName(persons, \"Alice\")); // Optional[Person{name='Alice', age=25}]\n        System.out.println(findPersonByName(persons, \"John\"));  // Optional.empty\n    }\n}\n```\n\n✅ **Сложность**: O(n) – в худшем случае перебираем весь список.\n\n---\n\n📌 **2. Через обычный `for`-цикл**\n\n```java\npublic static Optional<Person> findPersonByName(List<Person> persons, String name) {\n    for (Person person : persons) {\n        if (person.name.equalsIgnoreCase(name)) {\n            return Optional.of(person);\n        }\n    }\n    return Optional.empty();\n}\n```\n\n📌 **Когда использовать?** Если не хочется использовать `Stream API`.\n\n---\n\n🚀 **Вывод:**  \n✅ **Stream API** – лаконичное и удобное решение.  \n✅ **Цикл `for`** – классика, иногда читается проще.  \n✅ Теперь ты можешь быстро искать людей по имени! 🔥\n{{< /details >}}"
  filepath = "find-person-by-name"

