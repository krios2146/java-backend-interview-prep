  question = "Перевод средств между аккаунтами"
  answer = "Есть Spring сервис передачи денег с одного аккаунта на другой. Есть метод transferAmount(), который реализует эту логику. Этот метод принимает 3 параметра: аккаунт с которого переводим, куда переводим и amount сумму перевода. Задачи: выбрать тип amount, обосновать выбор. Реализовать логику перевода. Фокусируемся на валидации, бизнес-логике, корректности решения, производительности. БД нет, все храним в памяти. Сетевого взаимодействия по REST нет\n\n\n**Условие задачи:**  \n📌 Реализовать метод `transferAmount(Account from, Account to, ??? amount)` в сервисе, который переводит деньги из одного аккаунта в другой.\n- Всё хранится в памяти — без БД.\n- Без сетевого взаимодействия.\n- Фокус на **выборе типа** для суммы, **валидации**, **бизнес‑логике**, **корректности** и **производительности**.\n\n**Код:**\n\n```java\nclass Account {\n    // TODO Сюда можно добавлять поля\n}\n\nclass TransferService {\n    void transferAmount(Account from, Account to, ??? amount) {\n        // TODO Сюда добавляем логику списания/пополнения счетов\n    }\n}\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 **Тип `BigDecimal`** — подходит для денег: точные вычисления без потерь.  \n💡 Проверьте, что `from`, `to` и `amount` не `null`, и `amount > 0`.  \n💡 Убедитесь, что `from` и `to` — разные аккаунты.  \n💡 Перед списанием проверяйте, что `from.getBalance().compareTo(amount) >= 0`.  \n💡 Для потокобезопасности: блокируйте аккаунты в порядке `id`, чтобы избежать дедлока.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.math.BigDecimal;\nimport java.util.Objects;\n\npublic class TransferService {\n\n    public void transferAmount(Account from, Account to, BigDecimal amount) {\n        // Валидация входных параметров\n        Objects.requireNonNull(from, \"Source account must not be null\");\n        Objects.requireNonNull(to,   \"Target account must not be null\");\n        Objects.requireNonNull(amount, \"Amount must not be null\");\n        if (amount.compareTo(BigDecimal.ZERO) <= 0) {\n            throw new IllegalArgumentException(\"Amount must be positive\");\n        }\n        if (from.getId().equals(to.getId())) {\n            throw new IllegalArgumentException(\"Cannot transfer to the same account\");\n        }\n\n        // Выбираем порядок блокировок по id для избежания дедлоков\n        Account first  = from.getId().compareTo(to.getId()) < 0 ? from : to;\n        Account second = first == from ? to : from;\n\n        synchronized (first) {\n            synchronized (second) {\n                // Проверка достаточности средств\n                if (from.getBalance().compareTo(amount) < 0) {\n                    throw new IllegalArgumentException(\n                        \"Insufficient funds in account \" + from.getId());\n                }\n                // Выполняем перевод\n                from.debit(amount);\n                to.credit(amount);\n            }\n        }\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "transfer-amount"

[[tasks]]
  id = 52
  question = "Сжатие подряд идущих символов по ключу"
  answer = "**Условие задачи:**  \n📌 Даны два входных аргумента: строка `text` и целое число `k`. Необходимо заменить в строке все группы подряд идущих одинаковых символов так, чтобы каждые `k` одинаковых символов заменялись одним символом. Например:\n- При `k = 1` строка остаётся без изменений.\n- При `k = 2` группу `\"aa\"` заменяем на `\"a\"`.\n- При `k = 3` группу `\"aaa\"` также на `\"a\"`.\n- Если группа длиннее `k`, например `\"cccc\"` при `k = 2`, результат — две буквы `\"cc\"`.\n\n**Код:**\n\n```java\n// The main method must be in a class named \"\"Main\"\".\nclass Main {\n    public static void main(String[] args) {\n        System.out.println(\"\"Hello world!\"\");\n    }\n}\n\n\nExamples:\n\nInput\n        aabbababaacccdaaad\nK = 2\nOutput\n        abababaccdaad\n\nInput\n        aabbababaacccdaaad\nK = 1\nOutput\n        aabbababaacccdaaad\n\nInput\n        aabbababaacccdaaad\nK = 3\nOutput\naabbababaacdad\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Пройдитесь по символам строки один раз, отслеживая текущий символ и длину его группы.  \n💡 Когда группа прерывается или строка заканчивается, вычисляйте:\n\n```\ngroups = length / k;\nremainder = length % k;\nnewLength = groups + remainder;\n```\n\n💡 Добавляйте `newLength` копий символа в результат.  \n💡 Общая сложность — O(n).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nclass Main {\n    public static void main(String[] args) {\n        String input = \"aabbababaacccdaaad\";\n        System.out.println(compress(input, 2)); // abababaccdaad\n        System.out.println(compress(input, 1)); // aabbababaacccdaaad\n        System.out.println(compress(input, 3)); // aabbababaacdad\n    }\n\n    public static String compress(String text, int k) {\n        if (k <= 1 || text == null || text.isEmpty()) {\n            return text;\n        }\n        StringBuilder sb = new StringBuilder(text.length());\n        char prev = text.charAt(0);\n        int count = 1;\n        for (int i = 1; i < text.length(); i++) {\n            char c = text.charAt(i);\n            if (c == prev) {\n                count++;\n            } else {\n                appendCompressed(sb, prev, count, k);\n                prev = c;\n                count = 1;\n            }\n        }\n        appendCompressed(sb, prev, count, k);\n        return sb.toString();\n    }\n\n    private static void appendCompressed(StringBuilder sb, char ch, int count, int k) {\n        int groups = count / k;\n        int remainder = count % k;\n        int newLen = groups + remainder;\n        for (int i = 0; i < newLen; i++) {\n            sb.append(ch);\n        }\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "compress-consecutive"

[[tasks]]
  id = 53
  question = "Чередование вывода `foo` и `bar`"
  answer = "**Условие задачи:**  \n📌 Дана класс `FooBar`, в котором методы `foo()` и `bar()` выводят строки `\"foo\"` и `\"bar\"` по `n` раз каждый. Одна и та же инстанция передаётся двум потокам:\n- Поток A вызывает `foo()`\n- Поток B вызывает `bar()`\n\nНеобходимо изменить реализацию так, чтобы вывод был чередованием `\"foobarfoobar...\"` ровно `n` раз.\n\n**Код:**\n\n```java\nimport java.util.concurrent.Semaphore;\n\nclass FooBar {\n    private final int n;\n    // TODO: добавить синхронизацию\n\n    public FooBar(int n) {\n        this.n = n;\n        // TODO: инициализация\n    }\n\n    public void foo() throws InterruptedException {\n        for (int i = 0; i < n; i++) {\n            // TODO: ожидание и вывод \"foo\"\n            System.out.print(\"foo\");\n            // TODO: разрешить bar()\n        }\n    }\n\n    public void bar() throws InterruptedException {\n        for (int i = 0; i < n; i++) {\n            // TODO: ожидание и вывод \"bar\"\n            System.out.print(\"bar\");\n            // TODO: разрешить foo()\n        }\n    }\n}\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте два `Semaphore`:\n\n- `semFoo` с начальными разрешениями = 1,\n\n- `semBar` с начальными разрешениями = 0.  \n  💡 В методе `foo()` перед выводом вызывайте `semFoo.acquire()`, после — `semBar.release()`.  \n  💡 В методе `bar()` перед выводом вызывайте `semBar.acquire()`, после — `semFoo.release()`.  \n  💡 Это гарантирует строгую чередующуюся последовательность.  \n  {{< /details >}}\n\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.concurrent.Semaphore;\n\nclass FooBar {\n    private final int n;\n    private final Semaphore semFoo = new Semaphore(1);\n    private final Semaphore semBar = new Semaphore(0);\n\n    public FooBar(int n) {\n        this.n = n;\n    }\n\n    public void foo() throws InterruptedException {\n        for (int i = 0; i < n; i++) {\n            semFoo.acquire();        // ждём разрешения для foo\n            System.out.print(\"foo\");\n            semBar.release();        // разрешаем bar\n        }\n    }\n\n    public void bar() throws InterruptedException {\n        for (int i = 0; i < n; i++) {\n            semBar.acquire();        // ждём разрешения для bar\n            System.out.print(\"bar\");\n            semFoo.release();        // разрешаем foo\n        }\n    }\n\n    // Тестирование с двумя потоками\n    public static void main(String[] args) {\n        int n = 5;\n        FooBar fb = new FooBar(n);\n\n        Thread t1 = new Thread(() -> {\n            try {\n                fb.foo();\n            } catch (InterruptedException ignored) {}\n        });\n        Thread t2 = new Thread(() -> {\n            try {\n                fb.bar();\n            } catch (InterruptedException ignored) {}\n        });\n\n        t1.start();\n        t2.start();\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "foobar-alternate"

[[tasks]]
  id = 54
  question = "Self‑inject для корректного создания транзакций"
  answer = "**Условие задачи:**  \nДан код. Есть сервис с двумя методами a() и b(). Из b() вызывается a(). Если извне происходит вызов метода b(), сколько будет создано транзакций? Как поправить тот факт, что в таком вызове будет 0 транзакций, чтобы proxy создался и отработала вся логика?  Напиши self-inject\n\n\n**Код:**\n\n```java\n@Service\nclass SomeService {\n    @Transactional\n    public void a() {}\n\n    public void b() {\n        a();\n    }\n}\n\nSomeService.b();\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Spring AOP создает прокси вокруг бина и перехватывает только **внешние** вызовы.  \n💡 Внутренний вызов через `this.a()` **обходит** прокси, поэтому аннотация `@Transactional` не применяется.  \n💡 Нужно вызывать `a()` через прокси-бин: внедрить сам `SomeService` в него же (self‑injection).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n@Service\npublic class SomeService {\n    // self‑inject прокси\n    private final SomeService self;\n\n    public SomeService(SomeService self) {\n        this.self = self;\n    }\n\n    @Transactional\n    public void a() {\n        // логика, работающая в транзакции\n    }\n\n    public void b() {\n        // вместо this.a() использовать прокси\n        self.a();\n    }\n}\n```\n\n**Что происходит:**\n\n- При вызове `someService.b()` внешне – транзакция на `b()` не нужна.\n\n- Внутри `b()` вызов `self.a()` проходит через Spring‑прокси, что позволяет `@Transactional` на `a()` создать новую транзакцию.\n\n\nТаким образом, **одна транзакция** будет создана для метода `a()`.  \n{{< /details >}}"
  filepath = "self-injection"

[[tasks]]
  id = 55
  question = "Рефакторинг DocumentService с паттерном Стратегия"
  answer = "**Условие задачи:**  \n📌 Есть класс `DocumentService` с методом `readDocument(String type)`, в котором жёстко прописан выбор типа через `if-else`. Нужно провести код‑ревью, выделить плюсы и минусы текущей реализации, и **рефакторить** под паттерн **Стратегия**, а также **добавить реализацию** для чтения PDF.\n\n**Код:**\n\n```java\n@Component\npublic class DocumentService {\n    public InputStream readDocument(String type) {\n        DocumentReader reader = new DocumentReader();\n\n        if (type.equals(\"PDF\")) {\n            return reader.readPdf();\n        } else if (type.equals(\"DOCX\")) {\n            return reader.readDocx();\n        } else if (type.equals(\"XLSX\")) {\n            return reader.readXlsx();\n        } else {\n            return null;\n        }\n    }\n}\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Сейчас в `readDocument` жёсткая привязка к типам через `if-else` — при добавлении новых форматов придётся править метод.  \n💡 Плюс: простой и понятный код для трёх форматов.  \n💡 Минус: нарушает принцип OCP (открытость/закрытость), сложно тестировать и расширять.  \n💡 Решение: выделить интерфейс `DocumentReaderStrategy`, реализовать для каждого формата и инжектить коллекцию стратегий в `DocumentService`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n// 1. Определяем стратегию\npublic interface DocumentReaderStrategy {\n    boolean supports(String type);\n    InputStream read(InputStream source);\n}\n\n// 2. Реализация для PDF\n@Component\n@Qualifier(\"PDF\")\npublic class PdfDocumentReader implements DocumentReaderStrategy {\n    @Override\n    public boolean supports(String type) {\n        return \"PDF\".equalsIgnoreCase(type);\n    }\n\n    @Override\n    public InputStream read(InputStream source) {\n        // TODO: Реальная логика чтения PDF из source\n        // Для примера просто возвращаем source\n        return source;\n    }\n}\n\n// 3. Сервис с коллекцией стратегий\n@Service\npublic class DocumentService {\n    private final List<DocumentReaderStrategy> readers;\n\n    public DocumentService(List<DocumentReaderStrategy> readers) {\n        this.readers = readers;\n    }\n\n    public InputStream readDocument(String type, InputStream source) {\n        return readers.stream()\n            .filter(r -> r.supports(type))\n            .findFirst()\n            .orElseThrow(() -> new IllegalArgumentException(\"Unsupported type: \" + type))\n            .read(source);\n    }\n}\n\n// 4. Пример вызова\n@Component\npublic class AppRunner implements CommandLineRunner {\n    private final DocumentService documentService;\n\n    public AppRunner(DocumentService documentService) {\n        this.documentService = documentService;\n    }\n\n    @Override\n    public void run(String... args) throws Exception {\n        InputStream pdfSource = new ByteArrayInputStream(new byte[]{/* ... */});\n        InputStream result = documentService.readDocument(\"PDF\", pdfSource);\n        System.out.println(\"PDF прочитан, получен InputStream: \" + result);\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "refactor-document-service"

