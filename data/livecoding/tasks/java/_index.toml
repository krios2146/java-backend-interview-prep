[[tasks]]
  id = 38
  question = "Реализация `hashCode` для класса Point"
  answer = "**Условие задачи:**  \n📌 Реализовать метод `hashCode()` для класса `Point` с полями `int x` и `int y`. Объяснить, что возвращает `hashCode()`.\n\n**Код:**\n\n```java\npublic class Point {\n    private int x;\n    private int y;\n\n    // конструкторы, геттеры/сеттеры\n\n    @Override\n    public int hashCode() {\n        // TODO: ваша реализация\n    }\n}\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для смешивания полей используйте **простое умножение на простое число** (часто 31).  \n💡 Начальная величина результата может быть, например, `17` или `x`.  \n💡 Формула:\n\n```java\nint result = 17;\nresult = 31 * result + x;\nresult = 31 * result + y;\nreturn result;\n```\n\n💡 Можно воспользоваться утилитой `Objects.hash(x, y)` для краткости, но лучше понять классическое решение.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.Objects;\n\npublic class Point {\n    private int x;\n    private int y;\n\n    // Конструктор, геттеры/сеттеры omitted for brevity\n\n    @Override\n    public int hashCode() {\n        int result = 17;           // начальное произвольное ненулевое значение\n        result = 31 * result + x;  // учитываем поле x\n        result = 31 * result + y;  // учитываем поле y\n        return result;\n    }\n\n    @Override\n    public boolean equals(Object o) {\n        if (this == o) return true;\n        if (!(o instanceof Point)) return false;\n        Point other = (Point) o;\n        return this.x == other.x && this.y == other.y;\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "point-hashcode"

[[tasks]]
  id = 39
  question = "Реализация стека с поддержкой получения минимума за O(1)"
  answer = "**Условие задачи:**  \n🔥 Написать класс `MinStack` с методами:  \n- `void push(int x)` — добавить элемент в стек;  \n- `int pop()` — удалить и вернуть верхний элемент стека;  \n- `int top()` — вернуть верхний элемент без удаления;  \n- `int peekMin()` — вернуть минимальный элемент в стеке за O(1).\n\n**Код:**\n\n```java\npublic class MinStack {\n    // TODO\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте **два стека**: один для хранения всех элементов, другой — для хранения текущих минимумов.  \n💡 При `push(x)` добавляйте в стек-min либо `x`, если стек-min пуст, либо `min(x, текущий минимум)`.  \n💡 При `pop()` удаляйте элементы из обоих стеков одновременно.  \n💡 `peekMin()` просто возвращает верхний элемент из второго стека.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.Stack;\n\npublic class MinStack {\n    private final Stack<Integer> stack;\n    private final Stack<Integer> minStack;\n\n    public MinStack() {\n        stack = new Stack<>();\n        minStack = new Stack<>();\n    }\n\n    public void push(int x) {\n        stack.push(x);\n        // Если стек мин пуст или новый элемент меньше текущего минимума — пушим его\n        if (minStack.isEmpty() || x <= minStack.peek()) {\n            minStack.push(x);\n        } else {\n            // Иначе дублируем текущий минимум\n            minStack.push(minStack.peek());\n        }\n    }\n\n    public int pop() {\n        if (stack.isEmpty()) {\n            throw new RuntimeException(\"Стек пуст\");\n        }\n        minStack.pop();\n        return stack.pop();\n    }\n\n    public int top() {\n        if (stack.isEmpty()) {\n            throw new RuntimeException(\"Стек пуст\");\n        }\n        return stack.peek();\n    }\n\n    public int peekMin() {\n        if (minStack.isEmpty()) {\n            throw new RuntimeException(\"Стек пуст\");\n        }\n        return minStack.peek();\n    }\n\n    public static void main(String[] args) {\n        MinStack ms = new MinStack();\n        ms.push(5);\n        ms.push(2);\n        ms.push(4);\n        System.out.println(\"Мин: \" + ms.peekMin()); // 2\n        ms.push(1);\n        System.out.println(\"Мин: \" + ms.peekMin()); // 1\n        ms.pop();\n        System.out.println(\"Мин: \" + ms.peekMin()); // 2\n        System.out.println(\"Top: \" + ms.top());    // 4\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "min-stack"

[[tasks]]
  id = 40
  question = "Гибкий NotificationService с Spring"
  answer = "**Условие задачи:**  \n🔥 Написать сервис `Notificator`, который отправляет сообщения через различные внешние библиотеки (Email, SMS и т.д.), с возможностью легко добавлять новые каналы уведомлений, используя возможности Java и Spring.\n\n**Код:**\n\n```java\n// внешняя библиотека 1\npublic class EmailNotificationService {\n    public void sendEmail(String message) {\n        System.out.println(\"Send from email service\");\n        System.out.println(message);\n    }\n}\n\n// внешняя библиотека 2\npublic class SmsNotificationService {\n    public void sendSms(String message) {\n        System.out.println(\"Send from sms service\");\n        System.out.println(message);\n    }\n}\n\n// Ваш код начинается здесь\npublic interface NotificationService {\n    void send(String message);\n}\n\n@Service\npublic class EmailNotificationAdapter implements NotificationService {\n    private final EmailNotificationService emailService;\n\n    public EmailNotificationAdapter(EmailNotificationService emailService) {\n        this.emailService = emailService;\n    }\n\n    @Override\n    public void send(String message) {\n        emailService.sendEmail(message);\n    }\n}\n\n@Service\npublic class SmsNotificationAdapter implements NotificationService {\n    private final SmsNotificationService smsService;\n\n    public SmsNotificationAdapter(SmsNotificationService smsService) {\n        this.smsService = smsService;\n    }\n\n    @Override\n    public void send(String message) {\n        smsService.sendSms(message);\n    }\n}\n\n@Service\npublic class Notificator {\n    private final List<NotificationService> channels;\n\n    public Notificator(List<NotificationService> channels) {\n        this.channels = channels;\n    }\n\n    public void notifyAll(String message) {\n        for (NotificationService svc : channels) {\n            svc.send(message);\n        }\n    }\n}\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Введите общий интерфейс `NotificationService` с методом `send(String message)`.  \n💡 Для каждой внешней библиотеки создайте **адаптер** (Adapter), реализующий этот интерфейс и обёртывающий вызовы библиотеки.  \n💡 Используйте **конструкторную инъекцию** Spring для подключения внешних сервисов.  \n💡 В `Notificator` внедрите `List<NotificationService>` — Spring автоматически соберёт все реализации.  \n💡 Чтобы добавить новую библиотеку, достаточно реализовать ещё один адаптер `NotificationService` и зарегистрировать его как Spring-бин.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n// 1. Общий интерфейс\npublic interface NotificationService {\n    void send(String message);\n}\n\n// 2. Адаптер для Email\n@Service\npublic class EmailNotificationAdapter implements NotificationService {\n    private final EmailNotificationService emailService;\n    public EmailNotificationAdapter(EmailNotificationService emailService) {\n        this.emailService = emailService;\n    }\n    @Override\n    public void send(String message) {\n        emailService.sendEmail(message);\n    }\n}\n\n// 3. Адаптер для SMS\n@Service\npublic class SmsNotificationAdapter implements NotificationService {\n    private final SmsNotificationService smsService;\n    public SmsNotificationAdapter(SmsNotificationService smsService) {\n        this.smsService = smsService;\n    }\n    @Override\n    public void send(String message) {\n        smsService.sendSms(message);\n    }\n}\n\n// 4. Сервис-агрегатор уведомлений\n@Service\npublic class Notificator {\n    private final List<NotificationService> channels;\n    public Notificator(List<NotificationService> channels) {\n        this.channels = channels;\n    }\n    public void notifyAll(String message) {\n        channels.forEach(svc -> svc.send(message));\n    }\n}\n\n// Использование в приложении\n@Component\npublic class AppRunner implements CommandLineRunner {\n    private final Notificator notificator;\n    public AppRunner(Notificator notificator) {\n        this.notificator = notificator;\n    }\n    @Override\n    public void run(String... args) {\n        notificator.notifyAll(\"Hello, world!\");\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "notification-service"

[[tasks]]
  id = 41
  question = "Проверка простого числа"
  answer = "**Условие задачи:**  \n🔥 Написать консольное приложение на Java, которое определяет, является ли введённое пользователем число простым.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Число больше 1 — только такие могут быть простыми.  \n💡 Проверяйте делимость на 2 отдельно, затем только нечётные делители до √n.  \n💡 Если делитель найден — число составное, можно сразу вернуть `false`.  \n💡 Не забывайте обрабатывать `n <= 1` как не простые.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.Scanner;\n\npublic class PrimeChecker {\n    public static void main(String[] args) {\n        Scanner scanner = new Scanner(System.in);\n        System.out.print(\"Введите число: \");\n        int number = scanner.nextInt();\n        if (isPrime(number)) {\n            System.out.println(number + \" — простое число.\");\n        } else {\n            System.out.println(number + \" — не является простым.\");\n        }\n        scanner.close();\n    }\n\n    public static boolean isPrime(int n) {\n        if (n <= 1) {\n            return false; // 0 и отрицательные не простые\n        }\n        if (n == 2) {\n            return true;  // 2 — единственное чётное простое\n        }\n        if (n % 2 == 0) {\n            return false; // все другие чётные составные\n        }\n        int limit = (int) Math.sqrt(n);\n        for (int i = 3; i <= limit; i += 2) {\n            if (n % i == 0) {\n                return false;\n            }\n        }\n        return true;\n    }\n}\n```\n\n📌 **Что важно помнить:**  \n✅ Обработка крайних случаев (`n <= 1`, `n == 2`).  \n✅ Оптимизация: проверка только нечётных делителей до корня.  \n✅ Немедленный выход при первом найденном делителе.  \n{{< /details >}}"
  filepath = "check-prime"

[[tasks]]
  id = 42
  question = "Поиск наименее частого слова в строке"
  answer = "**Условие задачи:**  \n🔥 Дана очень длинная строка `text`. Необходимо найти слово, которое встречается в ней **минимальное** количество раз (но хотя бы один раз) и вернуть это слово. Если таких слов несколько, вернуть любое из них.\n\n**Код:**\n\n```java\npublic class RareWordFinder {\n    public static String findLeastFrequentWord(String text) {\n        // TODO\n    }\n\n    public static void main(String[] args) {\n        String text = \"apple orange banana apple pear banana apple\";\n        System.out.println(findLeastFrequentWord(text)); // например, \"orange\" или \"pear\"\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Разбейте строку на слова с помощью `String.split(\"\\\\s+\")`.  \n💡 Используйте `Map<String, Integer>` для подсчёта количества вхождений каждого слова.  \n💡 Пройдитесь по записи в `Map` и найдите ключ с минимальным значением счётчика.  \n💡 Учтите, что строка может содержать пунктуацию — при необходимости очистите слова от знаков препинания.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.*;\n\npublic class RareWordFinder {\n    public static String findLeastFrequentWord(String text) {\n        // Разбиение на слова\n        String[] words = text.split(\"\\\\s+\");\n        Map<String, Integer> freq = new HashMap<>();\n        for (String w : words) {\n            String word = w.replaceAll(\"[^a-zA-Z0-9]\", \"\").toLowerCase();\n            if (word.isEmpty()) continue;\n            freq.put(word, freq.getOrDefault(word, 0) + 1);\n        }\n        // Поиск слова с минимальной частотой\n        String rare = null;\n        int minCount = Integer.MAX_VALUE;\n        for (Map.Entry<String, Integer> entry : freq.entrySet()) {\n            if (entry.getValue() < minCount) {\n                minCount = entry.getValue();\n                rare = entry.getKey();\n            }\n        }\n        return rare;\n    }\n\n    public static void main(String[] args) {\n        String text = \"apple orange banana! apple, pear? banana apple\";\n        System.out.println(findLeastFrequentWord(text)); // orange или pear\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "find-rare-word"

[[tasks]]
  id = 43
  question = "Подсчет повторений слов в строке"
  answer = "**Условие задачи:**  \n🔥 Написать метод, который принимает строку (например, `\"тест тест1 нетест слово тест2 тест1 тест тест\"`) и возвращает `HashMap<String, Integer>`, где ключ — слово, значение — количество его повторений в строке.\n\n**Код:**\n\n```java\npublic class WordCounter {\n    public static HashMap<String, Integer> countWords(String text) {\n        // TODO\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Разбейте строку на слова с помощью `text.split(\"\\\\s+\")`.  \n💡 Для очистки можно убрать лишние знаки препинания, если они есть (например, `word.replaceAll(\"\\\\W+\", \"\")`).  \n💡 Используйте `HashMap<String, Integer>` и метод `map.merge(word, 1, Integer::sum)` для подсчёта.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.HashMap;\n\npublic class WordCounter {\n    public static HashMap<String, Integer> countWords(String text) {\n        HashMap<String, Integer> wordCounts = new HashMap<>();\n        if (text == null || text.isEmpty()) {\n            return wordCounts;\n        }\n        String[] words = text.split(\"\\\\s+\");\n        for (String w : words) {\n            String word = w.trim();\n            if (word.isEmpty()) {\n                continue;\n            }\n            wordCounts.merge(word, 1, Integer::sum);\n        }\n        return wordCounts;\n    }\n\n    public static void main(String[] args) {\n        String text = \"тест тест1 нетест слово тест2 тест1 тест тест\";\n        HashMap<String, Integer> counts = countWords(text);\n        counts.forEach((word, count) ->\n            System.out.println(word + \" -> \" + count)\n        );\n        // Ожидаемый вывод:\n        // тест -> 3\n        // тест1 -> 2\n        // нетест -> 1\n        // слово -> 1\n        // тест2 -> 1\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "word-count-map"

[[tasks]]
  id = 44
  question = "Собственный прокси для обеспечения отдельной транзакции"
  answer = "**Условие задачи:**  \n🔥 Дан класс с методами `methodA()` и `methodB()`, оба помечены аннотацией `@Transactional`, при этом `methodB()` должен выполняться в новой транзакции (`PROPAGATION_REQUIRES_NEW`). Но при вызове `methodB()` изнутри `methodA()` через `this.methodB()` прокси Spring не срабатывает, и новая транзакция не создаётся. Нужно написать свой прокси (или использовать self-injection), чтобы `methodB()` вызывался через прокси.\n\n**Код:**\n\n```java\n@Service\npublic class TransactionService {\n    @Transactional\n    void methodA() {\n        methodB();  // Внутренний вызов – прокси не применяется\n    }\n\n    @Transactional(propagation = Propagation.REQUIRES_NEW)\n    void methodB() {\n        // some logic\n    }\n}\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Spring AOP создаёт прокси вокруг Spring-бина и перехватывает только **внешние** вызовы через прокси.  \n💡 Чтобы вызвать `methodB()` через прокси, нужно получить ссылку на сам прокси-бина внутри класса и вызывать `self.methodB()` вместо `this.methodB()`.  \n💡 Можно внедрить сам бин `TransactionService` через Spring — он будет прокси-обёрткой.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport org.springframework.aop.framework.AopContext;\nimport org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Propagation;\nimport org.springframework.transaction.annotation.Transactional;\n\n@Service\npublic class TransactionService {\n\n    // Вариант 1: использование AopContext для получения прокси\n    @Transactional\n    public void methodA() {\n        // вместо this.methodB() – получаем текущий прокси\n        ((TransactionService) AopContext.currentProxy()).methodB();\n    }\n\n    @Transactional(propagation = Propagation.REQUIRES_NEW)\n    public void methodB() {\n        // some logic in a new transaction\n    }\n}\n```\n\n**Дополнительно**, чтобы `AopContext.currentProxy()` работал, нужно включить `exposeProxy`:\n\n```java\n@Configuration\n@EnableTransactionManagement(proxyTargetClass = true, exposeProxy = true)\npublic class AppConfig {\n    // ...\n}\n```\n\n---\n\n**Или вариант 2: self-injection прокси-бина через конструктор:**\n\n```java\n@Service\npublic class TransactionService {\n\n    private final TransactionService self;\n\n    public TransactionService(TransactionService self) {\n        this.self = self; // это прокси-бина, а не this\n    }\n\n    @Transactional\n    public void methodA() {\n        // вызываем через прокси\n        self.methodB();\n    }\n\n    @Transactional(propagation = Propagation.REQUIRES_NEW)\n    public void methodB() {\n        // some logic in a new transaction\n    }\n}\n```\n\n📌 **Что важно:**  \n✅ В обоих вариантах вызов `methodB()` идёт через Spring-прокси, поэтому аннотация `@Transactional(propagation = REQUIRES_NEW)` будет применена.  \n✅ Вариант с `AopContext` требует `exposeProxy = true` в настройках AOP.  \n✅ Self-injection конструктором не требует дополнительных настроек, но важно, чтобы Spring корректно внедрил прокси, а не оригинальный объект.  \n{{< /details >}}"
  filepath = "transaction-proxy"

