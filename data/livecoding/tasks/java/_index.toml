  id = 21
  question = "Code-review и исправление ошибок"
  answer = "**Условие задачи:**  \n🔍 Провести **код-ревью** класса `Test`, исправить ошибки и предложить улучшения.\n\n\n**Код**\n\n```java\npublic class Test {\n    private List<String> list = new LinkedList<String>();\n\n    public synchronized void addString(String s) {\n        list.add(s);\n    }\n\n    public void addStringsFromFile(String pathToFile) throws IOException {\n        File file = new File(pathToFile);\n        FileInputStream fis = new FileInputStream(file);\n        InputStreamReader isr = new InputStreamReader(fis, StandardCharsets.UTF_8);\n        Scanner scanner = new Scanner(isr);\n        String str;\n        while (scanner.hasNextLine()) {\n            str = scanner.nextLine();\n            if (!str.isBlank()) {\n                addString(str);\n            }\n        }\n    }\n\n    public void removeString(int i) {\n        list.remove(i);\n    }\n\n    public List<String> getList() {\n        return list;\n    }\n\n    public synchronized String formatString() {\n        String s = \"\"\"\";\n        for (int i = 0; i < list.size(); i++) {\n            s = s + list.get(i);\n        }\n        return s;\n    }\n}\n\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n\n{{< details \"Решение\" close >}}\n\n**Замеченные проблемы:**  \n❌ **Не хватает потокобезопасности.** `synchronized` используется в `addString()` и `formatString()`, но `removeString()` и `getList()` не защищены.  \n❌ **Не закрывается `Scanner`.** Это может привести к утечке ресурсов.  \n❌ **`FileInputStream` можно заменить на `Files.newBufferedReader()`.** Удобнее и безопаснее.  \n❌ **Строки конкатенируются через `+` в `formatString()`.** Это неэффективно, лучше `StringBuilder`.  \n❌ **Используется `LinkedList<String>`.** Для частого чтения больше подходит `ArrayList`.\n\n---\n\n**Исправленный код:**\n\n```java\nimport java.io.*;\nimport java.nio.charset.StandardCharsets;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.List;\nimport java.util.Scanner;\n\npublic class Test {\n    private final List<String> list = Collections.synchronizedList(new ArrayList<>());\n\n    public void addString(String s) {\n        list.add(s);\n    }\n\n    public void addStringsFromFile(String pathToFile) throws IOException {\n        try (BufferedReader reader = Files.newBufferedReader(Path.of(pathToFile), StandardCharsets.UTF_8)) {\n            String line;\n            while ((line = reader.readLine()) != null) {\n                if (!line.isBlank()) {\n                    addString(line);\n                }\n            }\n        }\n    }\n\n    public void removeString(int i) {\n        if (i >= 0 && i < list.size()) {\n            list.remove(i);\n        }\n    }\n\n    public List<String> getList() {\n        return Collections.unmodifiableList(list);\n    }\n\n    public String formatString() {\n        synchronized (list) {\n            StringBuilder sb = new StringBuilder();\n            for (String s : list) {\n                sb.append(s);\n            }\n            return sb.toString();\n        }\n    }\n}\n```\n\n---\n\n**Исправления и улучшения:**  \n✅ `list` теперь потокобезопасен (`Collections.synchronizedList`).  \n✅ `Scanner` заменён на `BufferedReader` + `Files.newBufferedReader()`.  \n✅ `formatString()` теперь использует `StringBuilder` (быстрее, чем `s + list.get(i)`).  \n✅ `removeString()` теперь проверяет границы индекса.  \n✅ `getList()` теперь возвращает **неизменяемый список** (`unmodifiableList()`).\n\n🚀 **Теперь код быстрее, безопаснее и читабельнее!** 🔥\n\n{{< /details >}}"
  filepath = "code-review-fixes"

[[tasks]]
  id = 22
  question = "Поиск первого уникального символа"
  answer = "**Условие задачи:**  \n🔍 **Реализовать метод `findFirstUniqueLetter`, который находит первый уникальный символ в строке.**  \n📌 **Если все символы повторяются, можно вернуть пробел `' '` или специальный символ.**\n\n📌 **Примеры:**\n\n```java\nfindFirstUniqueLetter(\"summer time sadness\") -> 'u'\nfindFirstUniqueLetter(\"AA bb CC d\") -> 'd'\n```\n\n**Код с собеседования**\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        test();\n    }\n\n    private static char findFirstUniqueLetter(String str) {\n        // Write your code here\n    }\n\n    private static void test() {\n        Map<String, Character> testInOut = new HashMap<>() {{\n            put(\"\"summer time sadness\"\", 'u');\n            put(\"\"AA bb CC d\"\", 'd');\n        }};\n\n        testInOut.entrySet().forEach(entry -> {\n            char answer = findFirstUniqueLetter(entry.getKey());\n            if (answer == entry.getValue()) System.out.println(\"\"Passed\"\");\n            else System.out.printf(\"\"Not passed. Received %s but expected %s\\n\"\", answer, entry.getValue());\n        });\n    }\n}\n```\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Можно использовать `LinkedHashMap`, `HashMap` или `int[]` для подсчета количества вхождений.  \n💡 `LinkedHashMap` сохраняет порядок добавления, что поможет найти первый уникальный символ.  \n💡 Можно дважды пройти по строке: сначала посчитать частоту, затем найти первый уникальный символ.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n📌 **1. Решение через `LinkedHashMap` (сохраняет порядок добавления):**\n\n```java\nimport java.util.LinkedHashMap;\nimport java.util.Map;\n\npublic class Main {\n    public static void main(String[] args) {\n        test();\n    }\n\n    private static char findFirstUniqueLetter(String str) {\n        Map<Character, Integer> charCount = new LinkedHashMap<>();\n\n        // Считаем количество вхождений символов\n        for (char c : str.toCharArray()) {\n            charCount.put(c, charCount.getOrDefault(c, 0) + 1);\n        }\n\n        // Находим первый уникальный символ\n        for (Map.Entry<Character, Integer> entry : charCount.entrySet()) {\n            if (entry.getValue() == 1) {\n                return entry.getKey();\n            }\n        }\n\n        return ' '; // Если нет уникального символа\n    }\n\n    private static void test() {\n        Map<String, Character> testInOut = new LinkedHashMap<>() {{\n            put(\"summer time sadness\", 'u');\n            put(\"AA bb CC d\", 'd');\n        }};\n\n        testInOut.forEach((input, expected) -> {\n            char answer = findFirstUniqueLetter(input);\n            if (answer == expected) System.out.println(\"✅ Passed\");\n            else System.out.printf(\"❌ Not passed. Received %s but expected %s\\n\", answer, expected);\n        });\n    }\n}\n```\n\n✅ **Сложность**: O(n) – один проход для подсчета, второй для поиска.\n\n---\n\n📌 **2. Решение через `int[]` (эффективно для английских букв):**\n\n```java\nprivate static char findFirstUniqueLetter(String str) {\n    int[] counts = new int[256]; // ASCII символы\n\n    for (char c : str.toCharArray()) {\n        counts[c]++;\n    }\n\n    for (char c : str.toCharArray()) {\n        if (counts[c] == 1) {\n            return c;\n        }\n    }\n\n    return ' ';\n}\n```\n\n✅ **Этот вариант быстрее, но использует `256` ячеек памяти.**\n\n🚀 **Теперь ты можешь быстро находить уникальные символы! 🔥**\n{{< /details >}}"
  filepath = "first-unique-char"

[[tasks]]
  id = 23
  question = "Исправление проблем в коде"
  answer = "**Условие задачи:**\n\nИсправьте проблемы в коде компонента, который строит строковое сообщение с перечислением ошибок. Необходимо улучшить производительность и исправить ошибки в строках. 🛠️\n\n```java\n@Component\npublic class Task2 {\n    public String buildAuditMessage(List<String> errors) {\n        String msg = \"\"В процессе обработки возникли следующие проблемы: \\n\"\";\n        for (String error : errors) {\n            msg += error + \"\"\\n\"\";\n        }\n        return msg;\n    }\n}\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Для эффективной конкатенации строк в цикле используйте **StringBuilder**, а не `+`. ⚡  \n💡 Убедитесь, что строковые литералы правильно оформлены в кавычках. ✍️\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n@Component\npublic class Task2 {\n    public String buildAuditMessage(List<String> errors) {\n        // Используем StringBuilder для более эффективной конкатенации строк\n        StringBuilder msg = new StringBuilder(\"В процессе обработки возникли следующие проблемы:\\n\");\n        for (String error : errors) {\n            msg.append(error).append(\"\\n\");\n        }\n        return msg.toString();\n    }\n}\n```\n\n1. **StringBuilder** — используется для более эффективной конкатенации строк. В цикле с обычной строкой (с помощью оператора `+`) создается много промежуточных объектов, что замедляет выполнение. 🏃‍♂️\n2. Ошибка с кавычками в исходном коде: лишние кавычки и неправильный синтаксис. В исправленном варианте строки правильно оформлены.\n\nИспользование `StringBuilder` позволяет избежать лишней нагрузки на память и ускорить выполнение программы. 🚀\n{{< /details >}}"
  filepath = "fix-message-building"

[[tasks]]
  id = 24
  question = "Реализовать CRUD для сущностей \"Книги\" и \"Авторы\""
  answer = "**Условие задачи:**\n\n\nОпишите CRUD операции для сущностей, используя формат \"GET /some/path 200;\".  \nНужно реализовать следующие операции для сущности книги (BookEntity) с учётом таблиц: books, authors, books_authors:\n\n1. Получение всех книг\n2. Получение конкретной книги\n3. Обновление книги\n4. Создание книги\n5. Удаление книги\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Используйте принципы REST для формирования эндпоинтов.   \n💡 Подбирайте соответствующие HTTP методы для каждой операции: GET для получения, POST для создания, PUT для обновления и DELETE для удаления.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```plaintext\n1. Получение всех книг: GET /books\n   // Этот эндпоинт возвращает список всех книг из таблицы \"books\".\n\n2. Получение конкретной книги: GET /books/{id}\n   // Эндпоинт для получения данных конкретной книги по уникальному идентификатору {id}.\n\n3. Обновление книги: PUT /books/{id}\n   // Используется для обновления информации о книге. Клиент отправляет новые данные, и сервер возвращает обновлённую книгу.\n\n4. Создание книги: POST /books\n   // Эндпоинт для создания новой книги. При успешном создании возвращается статус 201 (Created).\n\n5. Удаление книги: DELETE /books/{id}\n   // Эндпоинт для удаления книги по {id}. Возвращает статус 204 (No Content) при успешном удалении.\n```\n\nЭти CRUD операции можно аналогичным образом определить и для сущности автора (AuthorEntity), если потребуется. 😊\n{{< /details >}}"
  filepath = "crud-books"

[[tasks]]
  id = 25
  question = "Изменение названия атрибута в API"
  answer = "**Условие задачи:**\n\nОрганизовать переход на изменение названия принимающего атрибута с **title** на **name**. Нужно обеспечить обратную совместимость, чтобы клиенты, использующие старый формат (`\"title\": \"...\"`), могли продолжать работать, а новые — использовать `\"name\": \"...\"`.\n\nИсходный JSON:\n\n```json\n{\n    \"title\": \"...\"\n}\n```\n\nНовый JSON:\n\n```json\n{\n    \"name\": \"...\"\n}\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Используйте аннотацию **@JsonAlias** для поддержки старого названия атрибута.   \n💡 Основное имя атрибута задается с помощью **@JsonProperty**. \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport com.fasterxml.jackson.annotation.JsonAlias;\nimport com.fasterxml.jackson.annotation.JsonProperty;\n\npublic class BookDTO {\n    // Новое основное имя \"name\", поддерживаем также \"title\"\n    @JsonProperty(\"name\")\n    @JsonAlias(\"title\")\n    private String name;\n\n    // Геттер\n    public String getName() {\n        return name;\n    }\n\n    // Сеттер\n    public void setName(String name) {\n        this.name = name;\n    }\n}\n```\n\n**Объяснение решения:**\n\n1. **@JsonProperty(\"name\")**  \n    Эта аннотация указывает, что основное имя атрибута при сериализации и десериализации — **name**. 📘\n    \n2. **@JsonAlias(\"title\")**  \n    Позволяет принимать входящие JSON с полем **title**. Это обеспечивает обратную совместимость, и клиенты, использующие старое название, смогут продолжать отправлять данные в прежнем формате. 🔄\n    \n\nТаким образом, используя комбинацию этих аннотаций, мы можем легко перевести API на новое имя атрибута, не ломая работу с уже существующими клиентами. 🚀\n{{< /details >}}"
  filepath = "rename-attribute"

[[tasks]]
  id = 26
  question = "Исправление ошибок в Spring Boot приложении"
  answer = "**Условие задачи:**  \n🔥 Исправить ошибки в коде Spring Boot.\n\n**Код:**\n\n```java\npackage com.home.app;\n\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@SpringBootApplication\npublic class App {\n    public static void main(String[] args) {\n        SpringApplication.run(App.class, args);\n    }\n}\n\npackage com.home.controller;\n\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@Controller\npublic class Controller {\n    @GetMapping(\"\"/\"\")\n    public String test() {\n        return \"\"test\"\";\n    }\n}\n```\n\n{{< hint warning >}} \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 **Раздели классы по файлам:** Каждый файл должен содержать одно объявление package.  \n💡 **Правильные импорты:** Используй `org.springframework.stereotype.Controller` для `@Controller` и `org.springframework.web.bind.annotation.GetMapping` для `@GetMapping`.  \n💡 **Синтаксис строк:** Исправь строковый литерал в `@GetMapping(\"/\")` – убедись, что кавычки используются корректно.  \n💡 **Проверь структуру проекта:** Файлы должны находиться в директориях, соответствующих их package. {{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n_Создаем два отдельных файла:_\n\n**1. Файл App.java в пакете com.home.app:**\n\n```java\npackage com.home.app;\n\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@SpringBootApplication\npublic class App {\n    public static void main(String[] args) {\n        SpringApplication.run(App.class, args);\n    }\n}\n```\n\n**2. Файл Controller.java в пакете com.home.controller:**\n\n```java\npackage com.home.controller;\n\nimport org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.GetMapping;\n\n@Controller\npublic class Controller {\n    @GetMapping(\"/\")\n    public String test() {\n        return \"test\";\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Структурирование кода:** Каждый класс находится в отдельном файле с корректной организацией пакетов.  \n✅ **Использование правильных импортов:** Аннотации `@Controller` и `@GetMapping` импортированы из правильных пакетов.  \n✅ **Правильный синтаксис строк:** Строковый литерал в аннотации `@GetMapping` оформлен корректно.  \n✅ **Соответствие стандартам Spring Boot приложения.** \n{{< /details >}}"
  filepath = "fix-spring-app-code-errors"

[[tasks]]
  id = 27
  question = "Сортировка массива чисел"
  answer = "**Условие задачи:**  \n🔥 Напишите функцию, которая принимает массив `int[]`, сортирует его по возрастанию и возвращает результат.\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используй **алгоритм пузырьковой сортировки (Bubble Sort)**.  \n💡 Сравнивай соседние элементы и меняй местами, если они стоят не в том порядке.  \n💡 Повторяй процесс, пока массив не отсортируется.  \n💡 Сложность такого алгоритма — O(n²), он подходит только для небольших массивов.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class ArrayUtils {\n    public static int[] sortArray(int[] arr) {\n        for (int i = 0; i < arr.length - 1; i++) {\n            for (int j = 0; j < arr.length - i - 1; j++) {\n                if (arr[j] > arr[j + 1]) {\n                    int temp = arr[j];\n                    arr[j] = arr[j + 1];\n                    arr[j + 1] = temp;\n                }\n            }\n        }\n        return arr;\n    }\n\n    public static void main(String[] args) {\n        int[] nums = {9, 4, 7, 3, 1};\n        int[] sorted = sortArray(nums);\n        for (int n : sorted) {\n            System.out.print(n + \" \");\n        }\n        // Вывод: 1 3 4 7 9\n    }\n}\n```\n\n📌 **Что важно помнить:**  \n✅ Мы не используем `Arrays.sort()` — это ручная реализация.  \n✅ Это **пузырьковая сортировка**, простая в реализации.  \n✅ Подходит для обучения и простых задач, но неэффективна для больших массивов.  \n✅ Можно улучшить, добавив флаг для выхода при уже отсортированном массиве.\n\n{{< /details >}}"
  filepath = "sort-array"

[[tasks]]
  id = 28
  question = "Реализация двоичного дерева"
  answer = "**Условие задачи:**  \n🔥 Напишите простую реализацию **двоичного дерева**:\n\n- добавление элементов\n    \n- обход в **in-order** (сначала левый, потом текущий, потом правый)\n    \n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n🌳 **Двоичное дерево поиска** (Binary Search Tree) хранит меньшие значения слева, большие — справа.  \n📌 Для вставки используем рекурсивный метод `insertRec`.  \n📌 Обход in-order позволяет получить **отсортированную последовательность** значений.  \n💡 Используй `System.out.print()` внутри рекурсивного обхода, чтобы увидеть структуру.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class BinaryTree {\n\n    static class Node {\n        int value;\n        Node left;\n        Node right;\n\n        Node(int value) {\n            this.value = value;\n        }\n    }\n\n    private Node root;\n\n    public void insert(int value) {\n        root = insertRec(root, value);\n    }\n\n    private Node insertRec(Node root, int value) {\n        if (root == null) return new Node(value);\n\n        if (value < root.value) root.left = insertRec(root.left, value);\n        else if (value > root.value) root.right = insertRec(root.right, value);\n\n        return root;\n    }\n\n    public void inOrderTraversal() {\n        inOrderRec(root);\n    }\n\n    private void inOrderRec(Node root) {\n        if (root != null) {\n            inOrderRec(root.left);\n            System.out.print(root.value + \" \");\n            inOrderRec(root.right);\n        }\n    }\n\n    public static void main(String[] args) {\n        BinaryTree tree = new BinaryTree();\n        tree.insert(5);\n        tree.insert(3);\n        tree.insert(7);\n        tree.insert(1);\n        tree.insert(4);\n\n        System.out.println(\"In-order traversal:\");\n        tree.inOrderTraversal();  // Output: 1 3 4 5 7\n    }\n}\n```\n\n📌 **Что ты реализовал:**  \n✅ Добавление элементов в бинарное дерево.  \n✅ Обход in-order (слева → текущий → справа).  \n✅ Рекурсивную структуру дерева.  \n✅ Пример работы — можно запустить и проверить.\n\n{{< /details >}}"
  filepath = "binary-tree"

[[tasks]]
  id = 29
  question = "Рефакторинг функции Фибоначчи"
  answer = "**Условие задачи:**  \n🔥 Проведи рефакторинг функции вычисления числа Фибоначчи.  \nВ оригинальном коде используется рекурсия без оптимизации, что приводит к экспоненциальной сложности.\n\n**Код:**\n\n```java\nint fib(int n) {\n    if (n <= 1) return n;\n    return fib(n-1) + fib(n-2);\n}\n````\n\n\n{{< hint warning >}} **Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}} \n💡 **Оригинальная сложность:** Рекурсивное вычисление без мемоизации имеет экспоненциальную сложность O(2^n).  \n💡 **Оптимизация:** Используй итеративное вычисление или мемоизацию (динамическое программирование), чтобы снизить сложность до O(n).  \n💡 **Итеративный подход:** Применение цикла для последовательного вычисления чисел Фибоначчи – эффективное решение для данной задачи. {{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class Fibonacci {\n\n    // Итеративная реализация с линейной сложностью O(n)\n    public static int fib(int n) {\n        if (n <= 1) return n;\n        int a = 0, b = 1;\n        for (int i = 2; i <= n; i++) {\n            int next = a + b;\n            a = b;\n            b = next;\n        }\n        return b;\n    }\n    \n    public static void main(String[] args) {\n        System.out.println(\"fib(10) = \" + fib(10)); // Пример: 55\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Снижение сложности:** Итеративный подход снижает асимптотику с экспоненциальной до O(n).  \n✅ **Экономия памяти:** Использование двух переменных для хранения предыдущих значений вместо рекурсивного стека.  \n✅ **Повышенная производительность:** Новый подход позволяет эффективно вычислять Fibonacci для больших значений `n`. {{< /details >}}"
  filepath = "fib-refactor"

[[tasks]]
  id = 30
  question = "Инверсия числа"
  answer = "**Условие задачи:**  \n🔥 Написать метод, который принимает целое число, инвертирует его цифры и возвращает инвертированное число.  \n- Примеры:  \n  - Было: -123, стало: -321  \n  - Было: 1121, стало: 1211  \n  - Диапазон допустимых чисел: от -10000 до 10000.  \n  - Если число вне диапазона, сообщите об этом пользователю API.\n\n\n\n{{< hint warning >}} **Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}} \n💡 **Диапазон:** Проверь диапазон входного числа до начала инверсии.  \n💡 **Инверсия цифр:** Используй цикл while, чтобы последовательно извлекать и собирать цифры числа.  \n💡 **Обработка знака:** Сохрани знак числа и применяй его после инверсии.  \n💡 **Отладка:** Добавь вывод сообщения, если число выходит за допустимый диапазон. {{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class NumberUtils {\n\n    public static Integer reverse(int x) {\n        // Проверка диапазона: число должно быть от -10000 до 10000\n        if (x < -10000 || x > 10000) {\n            System.err.println(\"Введённое число \" + x + \" выходит за пределы диапазона [-10000, 10000].\");\n            return null;\n        }\n\n        int sign = x < 0 ? -1 : 1;\n        int absX = Math.abs(x);\n        int reversed = 0;\n        \n        // Инверсия цифр\n        while (absX > 0) {\n            reversed = reversed * 10 + absX % 10;\n            absX /= 10;\n        }\n        \n        return sign * reversed;\n    }\n    \n    public static void main(String[] args) {\n        int[] tests = {-123, 1121, 15000};\n        for (int num : tests) {\n            Integer result = reverse(num);\n            if (result != null) {\n                System.out.println(\"Исходное число: \" + num + \", инвертированное: \" + result);\n            }\n        }\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Проверка диапазона:** Метод обрабатывает входные данные вне допустимого диапазона.  \n✅ **Корректная инверсия:** Сохранение знака числа и последовательное извлечение цифр дают правильный результат.  \n✅ **Читаемость кода:** Лёгкая для понимания реализация, что упрощает поддержку.  \n✅ **Пример использования:** Функция main демонстрирует работу метода с различными входными данными. {{< /details >}}"
  filepath = "reverse-number"

[[tasks]]
  id = 31
  question = "Ревью и улучшение Spring-сервиса работы с контрактами"
  answer = "**Условие задачи:**  \n🔥 Проведите ревью кода сервиса для работы с контрактами. Сервис должен иметь два метода:\n- **save** — для сохранения контракта;\n- **getPage** — для получения контрактов постранично с использованием кэша, чтобы не обращаться к БД каждый раз.\n\n**Код:**\n\n```java\n@Service\npublic class ContractService {\n\n    final public static String KT = \"TOPIC\";\n    final public static int ONPAGE = 10;\n\n    public ContractRepository repo;\n    public KafkaTemplate<String, String> kafka;\n    public HashMap<Long, List<Contract>> cache;\n\n    void save(Long a, String b) {\n        Contract x = new Contract(a, b);\n        repo.save(x);\n        kafka.send(KT, \"contract was created\");\n    }\n\n    public List<Contract> getPage(int number) {\n        if (!cache.containsKey(number)) {\n            List<Contract> cs = repo.findAll();\n            List<Contract> r = new ArrayList<>();\n            for (int i = 0; i < ONPAGE; i++) {\n                Contract c = cs.get(i + number * ONPAGE);\n                r.add(c);\n            }\n            cache.put(number, r);\n        }\n        return cache.get(number);\n    }\n}\n```\n\n\n\n{{< hint warning >}} **Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}} \n💡 **Используй инъекцию зависимостей через конструктор** вместо публичных полей для `repo` и `kafka`.  \n💡 **Замени тип кэша** с `HashMap<Long, List<Contract>>` на более подходящий тип, например, `Map<Integer, List<Contract>>` с потокобезопасной реализацией (например, `ConcurrentHashMap`).  \n💡 **Обновление кэша:** При сохранении нового контракта стоит сбросить кэш, чтобы последующие запросы получали актуальные данные.  \n💡 **Обработка границ:** В методе `getPage` предусмотри случай, когда запрошенная страница выходит за пределы имеющихся данных, чтобы не возникала ошибка `IndexOutOfBoundsException`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport org.springframework.stereotype.Service;\nimport org.springframework.kafka.core.KafkaTemplate;\nimport java.util.List;\nimport java.util.Map;\nimport java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.concurrent.ConcurrentHashMap;\n\n@Service\npublic class ContractService {\n\n    private static final String KT = \"TOPIC\";\n    private static final int ONPAGE = 10;\n\n    private final ContractRepository repo;\n    private final KafkaTemplate<String, String> kafka;\n\n    // Используем потокобезопасный кэш\n    private final Map<Integer, List<Contract>> cache = new ConcurrentHashMap<>();\n\n    // Инъекция зависимостей через конструктор\n    public ContractService(ContractRepository repo, KafkaTemplate<String, String> kafka) {\n        this.repo = repo;\n        this.kafka = kafka;\n    }\n\n    // Метод сохранения контракта с последующим сбросом кэша\n    public void save(Long id, String data) {\n        Contract contract = new Contract(id, data);\n        repo.save(contract);\n        kafka.send(KT, \"contract was created\");\n        // Очистка кэша, чтобы данные оставались актуальными\n        cache.clear();\n    }\n\n    // Метод получения контрактов по страницам с обработкой границ\n    public List<Contract> getPage(int number) {\n        return cache.computeIfAbsent(number, page -> {\n            List<Contract> allContracts = repo.findAll();\n            int start = page * ONPAGE;\n            if (start >= allContracts.size()) {\n                // Если запрошенная страница выходит за пределы коллекции, вернем пустой список\n                return Collections.emptyList();\n            }\n            int end = Math.min(start + ONPAGE, allContracts.size());\n            return new ArrayList<>(allContracts.subList(start, end));\n        });\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Инъекция зависимостей через конструктор:** Улучшает тестируемость и делает код менее зависимым.  \n✅ **Потокобезопасный кэш:** Использование `ConcurrentHashMap` обеспечивает корректную работу в многопоточной среде.  \n✅ **Сброс кэша при сохранении:** Гарантирует, что кэш не будет содержать устаревшие данные после добавления нового контракта.  \n✅ **Обработка границ страницы:** Метод `getPage` возвращает пустой список, если запрошенная страница выходит за пределы имеющихся контрактов, что предотвращает ошибки.  \n✅ **Повышенная читаемость и поддерживаемость кода:** Улучшения делают сервис более надежным и соответствующим современным практикам разработки на Spring. {{< /details >}}"
  filepath = "contract-service"

[[tasks]]
  id = 32
  question = "Реализация паттерна Singleton в Java"
  answer = "**Условие задачи:**  \n🔥 Напишите реализацию паттерна Singleton в Java.\n\n\n\n{{< hint warning >}} **Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}} \n💡 Используй **private конструктор**, чтобы предотвратить создание экземпляров класса извне.  \n💡 Применяй **double-checked locking** с ключевым словом `volatile` для обеспечения потокобезопасности и избежания избыточной синхронизации.  \n💡 Метод `getInstance()` возвращает единственный экземпляр класса, гарантируя создание объекта только при первом обращении. {{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class Singleton {\n    // volatile гарантирует, что изменения переменной instance видны всем потокам\n    private static volatile Singleton instance;\n\n    // Приватный конструктор предотвращает создание экземпляров извне\n    private Singleton() {\n    }\n\n    // Метод для доступа к единственному экземпляру с использованием double-checked locking\n    public static Singleton getInstance() {\n        if (instance == null) { // Первичная проверка без синхронизации\n            synchronized (Singleton.class) {\n                if (instance == null) { // Вторая проверка внутри синхронизированного блока\n                    instance = new Singleton();\n                }\n            }\n        }\n        return instance;\n    }\n    \n    // Пример метода, который демонстрирует работу с Singleton\n    public void doSomething() {\n        System.out.println(\"Singleton instance is working!\");\n    }\n    \n    // Пример использования\n    public static void main(String[] args) {\n        Singleton singleton = Singleton.getInstance();\n        singleton.doSomething(); // Вывод: Singleton instance is working!\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Потокобезопасность:** Использование `volatile` и блока `synchronized` с двойной проверкой гарантирует корректную работу в многопоточной среде.  \n✅ **Контроль создания экземпляра:** Приватный конструктор предотвращает создание дополнительных экземпляров класса.  \n✅ **Эффективность:** Double-checked locking позволяет избежать блокировки при каждом вызове `getInstance()` после инициализации. {{< /details >}}"
  filepath = "singleton"

[[tasks]]
  id = 33
  question = "Проверка повторяющихся символов в строке"
  answer = "**Условие задачи:**  \n🔥 Реализуйте метод, который принимает на вход непустую строку и проверяет, что в строке отсутствуют символы, повторяющиеся более двух раз. Метод возвращает **true**, если в строке нет символов с более чем двумя повторениями, и **false**, если такие символы присутствуют.\n\n\n{{< hint warning >}} **Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}} \n💡 **Подсчет повторений:** Используйте `Map<Character, Integer>` для подсчета количества появлений каждого символа в строке.  \n💡 **Проверка лимита:** Если для любого символа количество появлений становится больше двух, сразу возвращайте `false`.  \n💡 **Обработка входных данных:** Добавьте проверку на пустую строку или `null` для повышения надежности. {{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class StringUtils {\n    public static boolean validateString(String input) {\n        if (input == null || input.isEmpty()) {\n            throw new IllegalArgumentException(\"Строка не должна быть пустой\");\n        }\n        \n        // Хранение количества повторений каждого символа\n        Map<Character, Integer> charCount = new HashMap<>();\n        for (char c : input.toCharArray()) {\n            int count = charCount.getOrDefault(c, 0) + 1;\n            if (count > 2) {\n                return false;\n            }\n            charCount.put(c, count);\n        }\n        return true;\n    }\n    \n    public static void main(String[] args) {\n        String validExample = \"aabbcc\"; // все символы повторяются не более двух раз\n        String invalidExample = \"aaabbc\"; // символ 'a' повторяется 3 раза\n        \n        System.out.println(\"Пример 1: \" + validExample + \" -> \" + validateString(validExample)); // true\n        System.out.println(\"Пример 2: \" + invalidExample + \" -> \" + validateString(invalidExample)); // false\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Эффективный подсчет:** Применение карты для быстрого подсчета повторений символов.  \n✅ **Ранняя остановка:** Метод возвращает `false`, сразу как только встречается символ, повторяющийся более двух раз.  \n✅ **Обработка ошибок:** Добавлена проверка на `null` и пустую строку для повышения надежности метода. {{< /details >}}"
  filepath = "string-repetition"

[[tasks]]
  id = 34
  question = "Решение задачи HackerRank \"Repeat String\""
  answer = "**Условие задачи:**  \n🔥 Дан строка `s`, состоящая из строчных английских букв, которая повторяется бесконечно. Дано целое число `n`. Необходимо посчитать количество букв `'a'` в первых `n` символах этой бесконечной строки.\n\n**Пример:**  \n- s = \"abcac\", n = 10  \n- Подстрока из первых 10 символов: \"abcacabcac\".  \n- Количество букв 'a': 4\n\n\n```java\n\nclass Result {\n\n    /*\n     * Complete the 'repeatedString' function below.\n     *\n     * The function is expected to return a LONG_INTEGER.\n     * The function accepts following parameters:\n     *  1. STRING s\n     *  2. LONG_INTEGER n\n     */\n}\n\n```\n\n\n\n{{< hint warning >}} **Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}} \n💡 **Используй деление:** Определи число полных повторений строки, разделив `n` на длину строки `s`.  \n💡 **Подсчитай 'a':** Сначала посчитай количество `'a'` в строке `s`, а затем умножь на число полных повторений.  \n💡 **Обработка остатка:** Не забудь проверить первые `n % s.length()` символов для корректного подсчёта. {{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class Result {\n\n    public static long repeatedString(String s, long n) {\n        // Подсчёт количества 'a' в строке s\n        long countA = 0;\n        for (char c : s.toCharArray()) {\n            if (c == 'a') {\n                countA++;\n            }\n        }\n\n        // Определяем, сколько полных повторов строки укладывается в n символов\n        long fullRepeats = n / s.length();\n        long totalA = fullRepeats * countA;\n        \n        // Обработка остатка: считаем 'a' в первых (n % s.length()) символах\n        int remainingChars = (int) (n % s.length());\n        for (int i = 0; i < remainingChars; i++) {\n            if (s.charAt(i) == 'a') {\n                totalA++;\n            }\n        }\n        return totalA;\n    }\n    \n    public static void main(String[] args) {\n        String s = \"abcac\";\n        long n = 10;\n        System.out.println(\"Количество 'a': \" + repeatedString(s, n)); // Ожидаемый вывод: 4\n    }\n}\n```\n\n📌 **Что улучшилось?**  \n✅ **Оптимальность:** Вместо создания бесконечной строки алгоритм учитывает полные повторения и остаток, что эффективно при больших `n`.  \n✅ **Читаемость кода:** Ясное разделение логики на подсчёт `a` в полном повторении и обработку остатка.  \n✅ **Стабильность:** Решение работает корректно даже для очень больших значений `n`. {{< /details >}}"
  filepath = "repeated-string"

[[tasks]]
  id = 35
  question = "Фильтрация списка пользователей in-place"
  answer = "**Условие задачи:**  \n🔥 Реализовать метод `filterUsers`, который **in-place** отфильтровывает список `users`, оставляя только тех, у кого имя начинается с `namePrefix` и возраст больше 18.\n\n```java\nimport lombok.Data;\nimport java.util.ArrayList;\n\n@Data\nclass User {\n    private String name;\n    private int age;\n}\n\npublic class UserUtils {\n    public static void filterUsers(ArrayList<User> users, String namePrefix) {\n        // ваш код\n    }\n}\n\n```\n\n{{< hint warning >}}\nСпойлеры к решению\n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Для удаления элементов in-place используйте Iterator и его метод remove().  \n💡 Можно также воспользоваться методом List.removeIf(...) из Java 8.  \n💡 Для проверки префикса используйте String.startsWith(namePrefix).  \n💡 Условие фильтрации: user.getAge() > 18.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n\nimport lombok.Data;\nimport java.util.ArrayList;\nimport java.util.Iterator;\n\n@Data\nclass User {\n    private String name;\n    private int age;\n}\n\npublic class UserUtils {\n    public static void filterUsers(ArrayList<User> users, String namePrefix) {\n        Iterator<User> iterator = users.iterator();\n        while (iterator.hasNext()) {\n            User user = iterator.next();\n            if (!user.getName().startsWith(namePrefix) || user.getAge() <= 18) {\n                iterator.remove();\n            }\n        }\n    }\n\n    // Альтернативный вариант с removeIf:\n    // public static void filterUsers(ArrayList<User> users, String namePrefix) {\n    //     users.removeIf(user ->\n    //         !user.getName().startsWith(namePrefix) || user.getAge() <= 18\n    //     );\n    // }\n\n    public static void main(String[] args) {\n        ArrayList<User> list = new ArrayList<>();\n        list.add(new User(\"Alice\", 20));\n        list.add(new User(\"Bob\", 17));\n        list.add(new User(\"Alex\", 25));\n        list.add(new User(\"Anna\", 18));\n\n        filterUsers(list, \"A\");\n        list.forEach(u -> System.out.println(u.getName() + \" \" + u.getAge()));\n        // Вывод:\n        // Alice 20\n        // Alex 25\n    }\n}\n{{< /details >}}"
  filepath = "filter-users-in-place"

