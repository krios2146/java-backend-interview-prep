  id = 58
  question = "Итератор объединённого упорядоченного обхода двух источников"
  answer = "Есть Java интерфейс итератор, который бегает по коллекции. У него 2 метода. hasNext() возвращает есть ли следующий элемент для итерирования. next() возвращает следующий элемент и сдвигает итератор. У нас есть 2 итератора, которые упорядочены по возрастанию, в соответствии с компаратором, который мы знаем. Задача: написать один итератор, который возьмет два имеющихся итератора и пройдется по их общему набору в том же их отсортированном порядке. Реализовать методы hasNext() и next(). Пример приведен перед кодом. Можно добавлять новые поля. Только не меняем контракт интерфейса. Хотим константную сложность по памяти, то есть нельзя сначала считать оба итератора в память\n\n```java\n/*\n        Принимает на вход два итератора a и b, упорядоченных по возрастанию\n        в соответствии с некоторым компаратором.\n        Написать итератор, который пройдет по общему набору из элементов a и b\n        в порядке возрастания.\n        Предполагаем, что все элементы не null.\n\n        Пример:\n        a проходит по {1, 3}\n        b проходит по {2, 3, 5, 6}\n        comparator -- обычное сравнение целых чисел\n        Тогда CollatingIterator делает обход в следующем порядке:\n        1 -> 2 -> 3 -> 3 -> 5 -> 6\n*/\n\npublic class CollatingIterator<E> implements Iterator<E> {\n\n    private final Iterator<E> a;\n    private final Iterator<E> b;\n    private final Comparator<E> comparator;\n\n    public CollatingIterator(Iterator<E> a, Iterator<E> b, Comparator<E> comparator) {\n        this.a = a;\n        this.b = b;\n        this.comparator = comparator;\n    }\n\n    @Override\n    public boolean hasNext() {\n        return false;\n    }\n\n    @Override\n    public E next() {\n        return null;\n    }\n}\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Храним **по одному** «взгляду вперёд» (`nextA`, `nextB`) для каждого итератора.  \n💡 При каждом вызове `next()` сравниваем эти «закэшированные» элементы и возвращаем меньший, затем **однократно** продвигаем соответствующий итератор.  \n💡 Метод `hasNext()` просто проверяет, есть ли что вернуть из любого из источников.  \n💡 Память — **константная**: храним максимум два элемента.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.Comparator;\nimport java.util.Iterator;\nimport java.util.NoSuchElementException;\n\npublic class CollatingIterator<E> implements Iterator<E> {\n\n    private final Iterator<E> a;\n    private final Iterator<E> b;\n    private final Comparator<E> comparator;\n\n    // Предварительно подгруженные элементы из каждого итератора\n    private E nextA;\n    private E nextB;\n    private boolean hasNextA;\n    private boolean hasNextB;\n\n    public CollatingIterator(Iterator<E> a, Iterator<E> b, Comparator<E> comparator) {\n        this.a = a;\n        this.b = b;\n        this.comparator = comparator;\n        // Инициализируем первый элемент каждого итератора\n        advanceA();\n        advanceB();\n    }\n\n    @Override\n    public boolean hasNext() {\n        return hasNextA || hasNextB;\n    }\n\n    @Override\n    public E next() {\n        if (!hasNext()) {\n            throw new NoSuchElementException();\n        }\n        E result;\n        if (hasNextA && hasNextB) {\n            // Оба источника имеют элемент — выбираем меньший по компаратору\n            if (comparator.compare(nextA, nextB) <= 0) {\n                result = nextA;\n                advanceA();\n            } else {\n                result = nextB;\n                advanceB();\n            }\n        } else if (hasNextA) {\n            result = nextA;\n            advanceA();\n        } else { // only B remains\n            result = nextB;\n            advanceB();\n        }\n        return result;\n    }\n\n    // Вспомогательный метод для подгрузки следующего элемента из итератора a\n    private void advanceA() {\n        if (a.hasNext()) {\n            nextA = a.next();\n            hasNextA = true;\n        } else {\n            nextA = null;\n            hasNextA = false;\n        }\n    }\n\n    // Вспомогательный метод для подгрузки следующего элемента из итератора b\n    private void advanceB() {\n        if (b.hasNext()) {\n            nextB = b.next();\n            hasNextB = true;\n        } else {\n            nextB = null;\n            hasNextB = false;\n        }\n    }\n}\n````\n\n\n{{< /details >}}"
  filepath = "collating-iterator"

