  id = 71
  question = "Исправление ошибок: OrderService"
  answer = "🔥 Исправление ошибок в коде\n\n```java\npublic class OrderService {\n\n@Autowired\nprivate OrderRepository orderRepository;\n\nprivate final NotificationService notificationService;\n\n@Autowired\npublic OrderService(NotificationService notificationService) {\n    this.notificationService = notificationService;\n}\n\npublic void updateOrderStatus(Long orderId, String newStatus) {\n    Order order = orderRepository.findById(orderId);\n\n    if (newStatus.equals(\"\"COMPLETED\"\")) {\n        order.setStatus(\"\"COMPLETED\"\");\n        notificationService.notify(order.getUserId(), \"\"Your order is completed\"\");\n    } else if (newStatus.equals(\"\"CANCELLED\"\")) {\n        order.setStatus(\"\"CANCELLED\"\");\n        notificationService.notify(order.getUserId(), \"\"Your order is cancelled\"\");\n    } else if (newStatus.equals(\"\"PENDING\"\")) {\n        order.setStatus(\"\"PENDING\"\");\n        orderRepository.save(order);\n    } else if (newStatus.equals(\"\"IN_PROGRESS\"\")) {\n        order.setStatus(\"\"IN_PROGRESS\"\");\n        orderRepository.save(order);\n    } else {\n        throw new IllegalArgumentException(\"\"Unsupported status: \"\" + newStatus);\n    }\n}\n}\n        \n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используй **один стиль DI** — конструктор для всех зависимостей (`final` поля, `@Autowired` на конструкторе).  \n💡 `findById` в Spring Data возвращает `Optional`: обработай случай, когда заказа нет.  \n💡 Проверяй `orderId` и `newStatus` на `null/blank`, избегай `newStatus.equals(...)` → возможен NPE.  \n💡 Статусы как **enum**, а не строковые литералы. Парси через `valueOf` безопасно.  \n💡 Сохраняй заказ **после** изменения статуса во всех ветках, а уведомления — **после успешного сохранения**.  \n💡 Оберни метод в `@Transactional`, чтобы изменение и сохранение были атомарны.  \n💡 Сделай обновление идемпотентным: если статус не поменялся — ничего не делай.  \n💡 Логируй, не используй `printStackTrace()`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n@Service\npublic class OrderService {\n\n    private final OrderRepository orderRepository;\n    private final NotificationService notificationService;\n    private static final Logger log = LoggerFactory.getLogger(OrderService.class);\n\n    @Autowired\n    public OrderService(OrderRepository orderRepository,\n                        NotificationService notificationService) {\n        this.orderRepository = Objects.requireNonNull(orderRepository);\n        this.notificationService = Objects.requireNonNull(notificationService);\n    }\n\n    @Transactional\n    public void updateOrderStatus(Long orderId, String newStatus) {\n        if (orderId == null) {\n            throw new IllegalArgumentException(\"orderId must not be null\");\n        }\n        if (newStatus == null || newStatus.isBlank()) {\n            throw new IllegalArgumentException(\"newStatus must not be null or blank\");\n        }\n\n        Order order = orderRepository.findById(orderId)\n                .orElseThrow(() -> new OrderNotFoundException(orderId));\n\n        OrderStatus targetStatus = parseStatus(newStatus);\n\n        // идемпотентность\n        if (targetStatus == order.getStatus()) {\n            log.debug(\"Status is already {} for orderId={}\", targetStatus, orderId);\n            return;\n        }\n\n        order.setStatus(targetStatus);\n        orderRepository.save(order); // сохранить во всех кейсах\n\n        // уведомления после успешного сохранения\n        if (targetStatus == OrderStatus.COMPLETED) {\n            notificationService.notify(order.getUserId(), \"Your order is completed\");\n        } else if (targetStatus == OrderStatus.CANCELLED) {\n            notificationService.notify(order.getUserId(), \"Your order is cancelled\");\n        }\n\n        log.info(\"Order {} status changed to {}\", orderId, targetStatus);\n    }\n\n    private OrderStatus parseStatus(String status) {\n        try {\n            return OrderStatus.valueOf(status.trim().toUpperCase(Locale.ROOT));\n        } catch (IllegalArgumentException ex) {\n            throw new IllegalArgumentException(\"Unsupported status: \" + status);\n        }\n    }\n}\n\n// Доменные типы и исключения\n\npublic enum OrderStatus {\n    PENDING, IN_PROGRESS, COMPLETED, CANCELLED\n}\n\npublic class OrderNotFoundException extends RuntimeException {\n    public OrderNotFoundException(Long id) {\n        super(\"Order not found: \" + id);\n    }\n}\n```\n\n- Конструкторная инъекция и `final` поля.\n- Безопасный парсинг статуса в `enum`.\n- `@Transactional` гарантирует атомарность.\n- Сохранение происходит для **всех** статусов.\n- Уведомления отправляются только для важных переходов и **после** сохранения.\n- Обработка отсутствующего заказа и защита от `null/blank`.\n\n{{< /details >}}"
  filepath = "order-service-fix-status"

[[tasks]]
  id = 72
  question = "Объединить массивы без дубликатов"
  answer = "🔥 Объедини два списка целых чисел, исключив повторы.\n\n```java\npublic List<Integer> collect(List<Integer> lst1, List<Integer> lst2) {\n    // код тут\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Чтобы убрать дубликаты, используй `Set` (например, `HashSet`).  \n💡 Для сохранения порядка можно применить `LinkedHashSet`.  \n💡 В Java 8+ удобно стримами: `Stream.concat(...)` и `distinct()`.  \n💡 Если важна сортировка, лучше использовать `TreeSet`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nВариант с `Set`:\n\n```java\npublic List<Integer> collect(List<Integer> lst1, List<Integer> lst2) {\n    Set<Integer> set = new LinkedHashSet<>();\n    set.addAll(lst1);\n    set.addAll(lst2);\n    return new ArrayList<>(set);\n}\n```\n\nВариант на Stream API:\n\n```java\npublic List<Integer> collect(List<Integer> lst1, List<Integer> lst2) {\n    return Stream.concat(lst1.stream(), lst2.stream())\n                 .distinct()\n                 .collect(Collectors.toList());\n}\n```\n\n- `LinkedHashSet` сохраняет порядок первого появления.\n\n- `distinct()` работает лениво и автоматически убирает дубли.\n\n- Важно: оба решения не зависят от размера входных коллекций.\n\n\n{{< /details >}}"
  filepath = "merge-arrays-unique"

[[tasks]]
  id = 73
  question = "Покрытие тестами метода calc"
  answer = "🔥 Нужно продумать тесты для функции `calc(a, b, operation)` по документации.\n\n```java\n/*\n * Выполняет одну из операций \"+\", \"-\", \"/\", \"*\" для переданных параметров\n * В любой непонятной ситуации, в т.ч. невозможность разделить нацело, бросается exception\n */\npublic Integer calc(Integer a, Integer b, String operation);\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Покрывай позитивные кейсы для всех операций: `+`, `-`, `*`, `/`.  \n💡 Обработай граничные условия: деление на ноль, остаток от деления ≠ 0.  \n💡 Проверь `null`-аргументы.  \n💡 Проверь некорректный оператор (например, `\"%\"`, `null`, пустая строка).  \n💡 Тестируй большие числа и переполнение.  \n💡 Используй JUnit 5 + AssertJ для удобных ассертов.  \n💡 Для исключений — `assertThrows`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nНабор тестов (примерно 10–12 штук):\n\n1. **Сложение**: `calc(2, 3, \"+\") == 5`.\n\n2. **Вычитание**: `calc(10, 4, \"-\") == 6`.\n\n3. **Умножение**: `calc(6, 7, \"*\") == 42`.\n\n4. **Деление нацело**: `calc(8, 2, \"/\") == 4`.\n\n5. **Деление с остатком**: `calc(7, 2, \"/\")` → exception.\n\n6. **Деление на ноль**: `calc(5, 0, \"/\")` → exception.\n\n7. **Неизвестная операция**: `calc(5, 2, \"%\")` → exception.\n\n8. **Оператор `null`**: → exception.\n\n9. **Аргументы `null`** (`a=null` или `b=null`) → exception.\n\n10. **Граничные значения**: `calc(Integer.MAX_VALUE, 1, \"+\")` → exception или переполнение (проверка).\n\n11. **Негативные числа**: `calc(-3, -7, \"*\") == 21`.\n\n12. **Идемпотентность**: повторный вызов с одинаковыми аргументами даёт тот же результат.\n\n\nПример JUnit 5 теста:\n\n```java\nclass CalcServiceTest {\n\n    private final CalcService service = new CalcService();\n\n    @Test\n    void shouldAddNumbers() {\n        assertThat(service.calc(2, 3, \"+\")).isEqualTo(5);\n    }\n\n    @Test\n    void shouldThrowWhenDividingByZero() {\n        assertThrows(ArithmeticException.class,\n            () -> service.calc(5, 0, \"/\"));\n    }\n\n    @Test\n    void shouldThrowOnUnsupportedOperation() {\n        assertThrows(IllegalArgumentException.class,\n            () -> service.calc(5, 2, \"%\"));\n    }\n}\n```\n\n- Покрытие позитивных и негативных сценариев.\n\n- Ясные названия тестов.\n\n- Используются `assertThrows` и `assertThat`.\n\n\n{{< /details >}}"
  filepath = "calc-tests"

